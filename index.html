                function processBillPayment(branch, date, amount) {
            let billId = generateBillId(branch, date);
            let currentPaid = billPayments[billId] || 0;
            let total = calculateBillTotal(branch, date);
            
            if (currentPaid + amount > total) {
                amount = total - currentPaid;
            }
            
            billPayments[billId] = currentPaid + amount;
            
            // Update individual shipment reminders
            let shipments = getBillShipments(branch, date);
            let remainingAmount = amount;
            
            shipments.forEach(shipment => {
                if (remainingAmount <= 0) return;
                
                let shipmentId = generateMainClientToBranchShipmentId(shipment);
                let currentReminder = getShipmentReminder(shipment);
                let paymentForThis = Math.min(remainingAmount, currentReminder);
                
                if (paymentForThis > 0) {
                    shipmentReminders[shipmentId] = currentReminder - paymentForThis;
                    remainingAmount -= paymentForThis;
                }
            });
            
            saveData();
            return true;
        }

        function renderBranchExpenseBreakdown(expenses) {
            let categories = {};
            expenses.forEach(exp => {
                if (!categories[exp.category]) {
                    categories[exp.category] = 0;
                }
                categories[exp.category] += exp.amount;
            });
            
            let total = Object.values(categories).reduce((sum, val) => sum + val, 0);
            
            return Object.entries(categories).map(([category, amount]) => `
                <div class="expense-category">
                    <span class="category-name">${category}</span>
                    <span class="category-amount">${formatMoney(amount)} (${Math.round((amount/total)*100)}%)</span>
                </div>
            `).join('');
        }
        function displayAdminBranchPayments(shipments, mainClient, branch) {
    let shipmentsWithStatus = shipments.map(s => {
        let totalPrice = s.sellingPrice * s.qty;
        let paidAmount = getShipmentPaidAmount(s);
        let reminder = totalPrice - paidAmount;
        let status = reminder <= 0 ? 'paid' : (paidAmount > 0 ? 'partial' : 'unpaid');
        
        return {
            ...s,
            totalPrice: totalPrice,
            paidAmount: paidAmount,
            reminder: reminder,
            status: status
        };
    });
    
    let totalValue = shipmentsWithStatus.reduce((sum, s) => sum + s.totalPrice, 0);
    let totalPaid = shipmentsWithStatus.reduce((sum, s) => sum + s.paidAmount, 0);
    let totalUnpaid = totalValue - totalPaid;
    let paidCount = shipmentsWithStatus.filter(s => s.status === 'paid').length;
    let partialCount = shipmentsWithStatus.filter(s => s.status === 'partial').length;
    let unpaidCount = shipmentsWithStatus.filter(s => s.status === 'unpaid').length;

    let html = `
        <div id="adminPaymentsContainer">
            <div class="payment-summary">
                <h3><i class="fas fa-chart-pie"></i> Payment Summary</h3>
                <div class="summary-stats" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="summary-item">
                        <div class="label">Main Client</div>
                        <div class="value">${mainClient || 'All Main Clients'}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Branch</div>
                        <div class="value">${branch || 'All Branches'}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Total Shipments</div>
                        <div class="value">${shipmentsWithStatus.length}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Paid</div>
                        <div class="value" style="color: #22c55e;">${paidCount}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Partial</div>
                        <div class="value" style="color: #f59e0b;">${partialCount}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Unpaid</div>
                        <div class="value" style="color: #ef4444;">${unpaidCount}</div>
                    </div>
                </div>
                <div class="summary-stats" style="grid-template-columns: repeat(3, 1fr); margin-top: 20px;">
                    <div class="summary-item">
                        <div class="label">Total Value</div>
                        <div class="value">${formatMoney(totalValue)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Total Paid</div>
                        <div class="value" style="color: #22c55e;">${formatMoney(totalPaid)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Total Unpaid</div>
                        <div class="value" style="color: #ef4444;">${formatMoney(totalUnpaid)}</div>
                    </div>
                </div>
            </div>

            <h3 style="margin-bottom: 20px;">Payment Details</h3>
    `;

    if (shipmentsWithStatus.length === 0) {
        html += `
            <div class="empty-state">
                <i class="fas fa-box"></i>
                <h3>No Shipments Found</h3>
                <p>No shipments match your filter criteria.</p>
            </div>
        `;
    } else {
        html += `
            <div class="table-wrapper">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Branch</th>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Selling Price</th>
                            <th>Total Price</th>
                            <th>Paid Amount</th>
                            <th>Remaining</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${shipmentsWithStatus.sort((a,b) => new Date(b.date) - new Date(a.date)).map(s => {
                            let statusClass = s.status === 'paid' ? 'badge-paid' : (s.status === 'partial' ? 'badge-partial' : 'badge-unpaid');
                            let statusText = s.status === 'paid' ? 'PAID' : (s.status === 'partial' ? 'PARTIAL' : 'UNPAID');
                            return `
                                <tr>
                                    <td>${s.date}</div>
                                    <td>${s.branch}</div>
                                    <td>${s.item}</div>
                                    <td>${s.qty}</div>
                                    <td>${formatMoney(s.sellingPrice)}</div>
                                    <td class="total-value">${formatMoney(s.totalPrice)}</div>
                                    <td class="${s.status === 'paid' ? 'status-paid' : 'status-unpaid'}">${formatMoney(s.paidAmount)}</div>
                                    <td class="${s.status === 'paid' ? 'status-paid' : 'reminder-amount'}">${formatMoney(s.reminder)}</div>
                                    <td>
                                        <span class="badge ${statusClass}">
                                            ${statusText}
                                        </span>
                                     </div>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                    <tfoot>
                        <tr class="grand-total">
                            <td colspan="5"><strong>Grand Total</strong></div>
                            <td><strong>${formatMoney(totalValue)}</strong></div>
                            <td><strong>${formatMoney(totalPaid)}</strong></div>
                            <td><strong>${formatMoney(totalUnpaid)}</strong></div>
                            <td></div>
                        </tr>
                    </tfoot>
                </table>
            </div>
        `;
    }

    html += `</div>`;

    document.getElementById('adminPaymentsContainer').style.display = 'block';
    document.getElementById('adminPaymentsContainer').innerHTML = html;
}
function loadDailyPaymentsSummary() {
    let dailyRecords = getAllDailyPayments();

                <i class="fas fa-calendar"></i>
                <h3>No Daily Records</h3>
                <p>No payment records found for any day.</p>

    } else {
        html = dailyRecords.map(day => `
            <div class="daily-payment-card">
                <div class="daily-payment-header">
                    <span class="daily-payment-date">${day.date}</span>
                    <span class="daily-payment-total">${day.shipments.length} bills</span>

                <div class="daily-payment-stats">
                    <div class="daily-stat-item">

                    </div>
                    <div class="daily-stat-item">
                        <div class="daily-stat-label">Total Unpaid</div>
                        <div class="daily-stat-value unpaid">${formatMoney(day.totalUnpaid)}</div>
                    </div>
                    <div class="daily-stat-item">
                        <div class="daily-stat-label">Grand Total</div>
                        <div class="daily-stat-value">${formatMoney(day.totalPaid + day.totalUnpaid)}</div>
                    </div>
                </div>
                <button class="btn btn-view" onclick="loadSpecificDate('${day.date}')" style="margin-top: 10px; width: 100%;">
                    <i class="fas fa-eye"></i> View Details

            </div>
        `).join('');
    }
    
    document.getElementById('dailyPaymentsContainer').innerHTML = html;
}

    let html = `

            ${dailyShipments.length === 0 ? 
                `<div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>No Shipments Found</h3>
                    <p>No items were sent to ${branch} on ${date}.</p>
                </div>` : 
                `<div class="table-wrapper">

                            <tr>
                                <th>Item Name</th>
                                <th>Date</th>
                                <th>Quantity</th>

                            </tr>
                        </thead>
                        <tbody>
                            ${dailyShipments.map(s => `
                                <tr>
                                    <td>${escapeHtml(s.item)}</div>
                                    <td>${s.date}</div>
                                    <td>${s.qty}</div>
                                    <td>${formatMoney(s.sellingPrice)}</div>
                                    <td class="total-value">${formatMoney(s.sellingPrice * s.qty)}</div>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`
            }

            <div class="summary-box">
                <h3 style="margin-bottom: 20px; color: #166534;">Summary</h3>
                <div class="summary-row">
                    <span class="summary-label">Total Items Shipped:</span>
                    <span class="summary-value">${totalItems}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Total Value (Based on Selling Price):</span>
                    <span class="summary-value">${formatMoney(totalValue)}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Number of Shipments:</span>

            ${dailyShipments.length > 0 ?

                </div>` : ''
            }
        </div>
    `;

    document.getElementById('billingDataContainer').style.display = 'block';
    document.getElementById('billingDataContainer').innerHTML = html;
}
 
function isShipmentReceived(shipment) {
    let id = generateMainClientToBranchShipmentId(shipment);
    return shipmentReminders[id + '_received'] === true;
}

window.markItemAsReceived = function(itemName, receivedDate) {
    if (confirm(`Have you received ${itemName} on ${receivedDate}?`)) {
        let receivedKey = `branch_received_${currentUser.username}_${itemName}`;
        localStorage.setItem(receivedKey, 'true');
        
        // ========== ONLY FOR MAIN CLIENT SHIPMENTS - Mark as received ==========
        let branch = currentUser.username;
        let shipment = mainClientToBranchShipments.find(s => 
            s.branch === branch && s.item === itemName
        );
        
        if (shipment) {
            let shipmentId = generateMainClientToBranchShipmentId(shipment);
            // This only affects the main client's Shipments section
            shipmentReminders[shipmentId + '_received'] = true;
        }
        
        saveData();
        renderBranchInventory();
        alert(`${itemName} marked as received successfully!`);
    }
};

function markMainClientItemAsPaid(item) {
    let id = generateMainClientItemId(item);
    mainClientPayments[id] = true;
    saveData();
    
    // Also update the distributed status for this item
    let distributedKey = `${item.name}`;
    if (!mainClientDistributed[distributedKey]) {
        mainClientDistributed[distributedKey] = 0;
    }
    
    // Refresh the current view
    if (currentUser && currentUser.role === 'admin') {
        if (document.querySelector('.nav-item.active')?.innerText.toLowerCase().includes('payments')) {
            renderAdminPayments();
        }
    } else if (currentUser && currentUser.role === 'mainclient') {
        renderMainClientInventory();
    }
}

window.changePassword = function(id) {
    let user = users.find(u => u.id === id);
    if (!user) return;
    let newPass = prompt('Enter new password for ' + user.username + ':');
    if (newPass && newPass.trim()) {
        user.password = newPass;
        saveData();
        renderUsers();
        alert('Password changed successfully!');
    }
};

window.toggleFreeze = function(id) {
    let user = users.find(u => u.id === id);
    if (user) {
        user.frozen = !user.frozen;
        saveData();
        renderUsers();
        alert(`User "${user.username}" ${user.frozen ? 'frozen' : 'unfrozen'} successfully!`);
    }
};

window.toggleBlock = function(id) {

        user.blocked = !user.blocked;

        window.saveBranchItem = function(client, role) {
            let name = document.getElementById('branchItemName').value;
            let quantity = parseInt(document.getElementById('branchItemQuantity').value);
            let purchasePrice = parseFloat(document.getElementById('branchItemPurchasePrice').value);
            let sellingPrice = parseFloat(document.getElementById('branchItemSellingPrice').value);
            let supplier = document.getElementById('branchItemSupplier').value;

            if (!name || !quantity || !purchasePrice || !sellingPrice) {
                alert('Please fill all fields');
                return;
            }

            if (role === 'mainclient') {
                let newItem = {
                    id: mainClientItems.length + 1,
                    name: name,
                    sellingPrice: sellingPrice,
                    purchasePrice: purchasePrice,
                    quantity: quantity,
                    date: getTodayDate(),
                    supplier: supplier
                };
                mainClientItems.push(newItem);
            } else {
                if (!branchInventory[client]) {
                    branchInventory[client] = [];
                }

                let newItem = {
                    id: branchInventory[client].length + 1,
                    name: name,
                    quantity: quantity,
                    purchasePrice: purchasePrice,
                    sellingPrice: sellingPrice,
                    supplier: supplier
                };

                branchInventory[client].push(newItem);
                
                if (!branchFinance[client]) {
                    branchFinance[client] = { totalSale: 0, totalPurchase: 0, totalProfit: 0, totalLoss: 0, totalExpenses: 0 };
                }
                branchFinance[client].totalPurchase += (purchasePrice * quantity);
            }

            saveData();
            closeModal();
            loadBranchInventory();
            
            alert(`Item added to ${client} successfully!`);
        };

        window.updateBranchItem = function(client, itemId, role) {

            let item;
            
            if (role === 'mainclient') {
                oldItem = mainClientItems.find(i => i.id === itemId);
                if (!oldItem) return;
                
                let oldName = oldItem.name;
                
                oldItem.name = document.getElementById('branchItemName').value;
                oldItem.quantity = parseInt(document.getElementById('branchItemQuantity').value);
                oldItem.purchasePrice = parseFloat(document.getElementById('branchItemPurchasePrice').value);
                oldItem.sellingPrice = parseFloat(document.getElementById('branchItemSellingPrice').value);
                oldItem.supplier = document.getElementById('branchItemSupplier').value;
                
                let mainInventoryItem = mainInventory.find(i => i.name === oldName);
                if (mainInventoryItem) {
                    mainInventoryItem.name = oldItem.name;
                    mainInventoryItem.purchasePrice = oldItem.purchasePrice;
                    mainInventoryItem.sellingPrice = oldItem.sellingPrice;
                    mainInventoryItem.quantity = oldItem.quantity;
                    mainInventoryItem.supplier = oldItem.supplier;
                }
                
                Object.keys(branchInventory).forEach(branchKey => {
                    branchInventory[branchKey].forEach(branchItem => {
                        if (branchItem.name === oldName) {
                            branchItem.name = oldItem.name;
                            branchItem.purchasePrice = oldItem.purchasePrice;
                            branchItem.sellingPrice = oldItem.sellingPrice;
                            branchItem.supplier = oldItem.supplier;
                        }
                    });
                });
                
                shipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                mainClientToBranchShipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                salesHistory.forEach(sale => {
                    if (sale.item === oldName) {
                        sale.item = oldItem.name;
                    }
                });
                
                lowStockAlerts.forEach(alert => {
                    if (alert.itemName === oldName) {
                        alert.itemName = oldItem.name;
                    }
                });
                
                branchReturns.forEach(ret => {
                    if (ret.itemName === oldName) {
                        ret.itemName = oldItem.name;
                        ret.pricePerUnit = oldItem.purchasePrice;
                    }
                });
                
            } else {
                oldItem = branchInventory[client]?.find(i => i.id === itemId);
                if (!oldItem) return;
                
                let oldName = oldItem.name;
                let oldPurchaseTotal = oldItem.purchasePrice * oldItem.quantity;
                
                oldItem.name = document.getElementById('branchItemName').value;
                oldItem.quantity = parseInt(document.getElementById('branchItemQuantity').value);
                oldItem.purchasePrice = parseFloat(document.getElementById('branchItemPurchasePrice').value);
                oldItem.sellingPrice = parseFloat(document.getElementById('branchItemSellingPrice').value);
                oldItem.supplier = document.getElementById('branchItemSupplier').value;
                
                if (branchFinance[client]) {
                    let newPurchaseTotal = oldItem.purchasePrice * oldItem.quantity;
                    branchFinance[client].totalPurchase = (branchFinance[client].totalPurchase || 0) - oldPurchaseTotal + newPurchaseTotal;
                }
                
                let mainInventoryItem = mainInventory.find(i => i.name === oldName);
                if (mainInventoryItem) {
                    mainInventoryItem.name = oldItem.name;
                    mainInventoryItem.purchasePrice = oldItem.purchasePrice;
                    mainInventoryItem.sellingPrice = oldItem.sellingPrice;
                    mainInventoryItem.quantity += (oldItem.quantity - mainInventoryItem.quantity);
                    mainInventoryItem.supplier = oldItem.supplier;
                }
                
                mainClientItems.forEach(mainItem => {
                    if (mainItem.name === oldName) {
                        mainItem.name = oldItem.name;
                        mainItem.purchasePrice = oldItem.purchasePrice;
                        mainItem.sellingPrice = oldItem.sellingPrice;
                        mainItem.supplier = oldItem.supplier;
                    }
                });
                
                Object.keys(branchInventory).forEach(branchKey => {
                    if (branchKey !== client) {
                        branchInventory[branchKey].forEach(branchItem => {
                            if (branchItem.name === oldName) {
                                branchItem.name = oldItem.name;
                                branchItem.purchasePrice = oldItem.purchasePrice;
                                branchItem.sellingPrice = oldItem.sellingPrice;
                                branchItem.supplier = oldItem.supplier;
                            }
                        });
                    }
                });
                
                shipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                mainClientToBranchShipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                salesHistory.forEach(sale => {
                    if (sale.item === oldName) {
                        sale.item = oldItem.name;
                    }
                });
                
                lowStockAlerts.forEach(alert => {
                    if (alert.itemName === oldName) {
                        alert.itemName = oldItem.name;
                    }
                });
                
                branchReturns.forEach(ret => {
                    if (ret.itemName === oldName && ret.branch === client) {
                        ret.itemName = oldItem.name;
                        ret.pricePerUnit = oldItem.purchasePrice;
                    }
                });
            }

            recalcMainFinance();
            saveData();
            closeModal();
            loadBranchInventory();
            
            alert(`Item updated successfully across all locations!`);
        };

        window.deleteBranchItem = function(client, itemId, role) {
            if (confirm('Are you sure you want to delete this item? This will remove it from all locations!')) {
                if (role === 'mainclient') {
                    let item = mainClientItems.find(i => i.id === itemId);
                    if (item) {
                        let itemName = item.name;
                        mainClientItems = mainClientItems.filter(i => i.id !== itemId);
                        mainInventory = mainInventory.filter(i => i.name !== itemName);
                        
                        Object.keys(branchInventory).forEach(branchKey => {
                            branchInventory[branchKey] = branchInventory[branchKey].filter(i => i.name !== itemName);
                        });
                        
                        shipments = shipments.filter(s => s.item !== itemName);
                        mainClientToBranchShipments = mainClientToBranchShipments.filter(s => s.item !== itemName);
                        salesHistory = salesHistory.filter(s => s.item !== itemName);
                        lowStockAlerts = lowStockAlerts.filter(a => a.itemName !== itemName);
                    }
                } else {
                    let item = branchInventory[client]?.find(i => i.id === itemId);
                    if (item) {
                        let itemName = item.name;
                        
                        if (branchFinance[client]) {
                            branchFinance[client].totalPurchase -= (item.purchasePrice * item.quantity);
                        }
                        
                        branchInventory[client] = branchInventory[client].filter(i => i.id !== itemId);
                        mainInventory = mainInventory.filter(i => i.name !== itemName);
                        mainClientItems = mainClientItems.filter(i => i.name !== itemName);
                        
                        Object.keys(branchInventory).forEach(branchKey => {
                            if (branchKey !== client) {
                                branchInventory[branchKey] = branchInventory[branchKey].filter(i => i.name !== itemName);
                            }
                        });
                        
                        shipments = shipments.filter(s => s.item !== itemName);
                        mainClientToBranchShipments = mainClientToBranchShipments.filter(s => s.item !== itemName);
                        salesHistory = salesHistory.filter(s => s.item !== itemName);
                        lowStockAlerts = lowStockAlerts.filter(a => a.itemName !== itemName);
                    }
                }
                
                recalcMainFinance();
                saveData();
                loadBranchInventory();
                
                alert(`Item deleted from all locations successfully!`);
            }
        };



    </script>
