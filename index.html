function getTodayDate() {
    let today = new Date();
    let year = today.getFullYear();
    let month = String(today.getMonth() + 1).padStart(2, '0');
    let day = String(today.getDate()).padStart(2, '0');
    let result = `${year}-${month}-${day}`;
    console.log('getTodayDate() returning:', result);
    return result;
}

function formatDateForCompare(dateString) {
    if (!dateString) return '';
    
    console.log('formatDateForCompare input:', dateString, typeof dateString);
    
    // اگر تاریخ به فرمت ISO است (2026-04-27T19:30:00.000Z)
    if (dateString.includes('T')) {
        let result = dateString.split('T')[0];
        console.log('  ISO format -> extracted:', result);
        return result;
    }
    
    // اگر تاریخ به فرمت YYYY-MM-DD است
    if (dateString.match(/^\d{4}-\d{2}-\d{2}$/)) {
        return dateString;
    }
    
    // اگر تاریخ به فرمت YYYY/MM/DD است
    if (dateString.includes('/')) {
        let result = dateString.replace(/\//g, '-');
        console.log('  Slash format -> converted:', result);
        return result;
    }
    
    return dateString;
}

        function togglePassword(inputId, icon) {
            let input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function formatMoney(amount) {
    if (amount === undefined || amount === null || isNaN(amount)) {
        return 'AFG 0.00';
    }
    let numAmount = typeof amount === 'string' ? parseFloat(amount) : amount;
    if (isNaN(numAmount)) {
        return 'AFG 0.00';
    }
    return 'AFG ' + numAmount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
}

        // ==================== BILL/INVOICE FUNCTIONS ====================
        function generateBillId(branch, date) {
            return `BILL-${branch}-${date}`;
        }

        function getBillShipments(branch, date) {
            return mainClientToBranchShipments.filter(s => 
                s.branch === branch && 
                s.date === date
            );
        }

        function calculateBillTotal(branch, date) {
            let shipments = getBillShipments(branch, date);
            return shipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty), 0);  // ✅
        }

        function getBillPaidAmount(branch, date) {
            let billId = generateBillId(branch, date);
            return billPayments[billId] || 0;
        }

        function getBillRemainingAmount(branch, date) {
            let total = calculateBillTotal(branch, date);
            let paid = getBillPaidAmount(branch, date);
            return total - paid;
        }

        function getBillStatus(branch, date) {
            let total = calculateBillTotal(branch, date);
            let paid = getBillPaidAmount(branch, date);
            
            if (paid <= 0) return 'unpaid';
            if (paid >= total) return 'paid';
            return 'partial';
        }

        function processBillPayment(branch, date, amount) {
            let billId = generateBillId(branch, date);
            let currentPaid = billPayments[billId] || 0;
            let total = calculateBillTotal(branch, date);
            
            if (currentPaid + amount > total) {
                amount = total - currentPaid;
            }
            
            billPayments[billId] = currentPaid + amount;
            
            // Update individual shipment reminders
            let shipments = getBillShipments(branch, date);
            let remainingAmount = amount;
            
            shipments.forEach(shipment => {
                if (remainingAmount <= 0) return;
                
                let shipmentId = generateMainClientToBranchShipmentId(shipment);
                let currentReminder = getShipmentReminder(shipment);
                let paymentForThis = Math.min(remainingAmount, currentReminder);
                
                if (paymentForThis > 0) {
                    shipmentReminders[shipmentId] = currentReminder - paymentForThis;
                    remainingAmount -= paymentForThis;
                }
            });
            
            saveData();
            return true;
        }

        function generateMainClientToBranchShipmentId(shipment) {
            return `${shipment.date}_${shipment.branch}_${shipment.item}_${shipment.qty}`;
        }


function getShipmentReminder(shipment) {
    let totalPrice = shipment.sellingPrice * shipment.qty;
    
    // اول از shipmentPayments چک کن (دیتابیس)
    if (shipment.uniqueKey && shipmentPayments[shipment.uniqueKey] !== undefined) {
        let paid = shipmentPayments[shipment.uniqueKey];
        let reminder = totalPrice - paid;
        return reminder < 0 ? 0 : reminder;
    }
    
    // اگر در shipmentPayments نبود، از shipmentReminders استفاده کن
    let id = generateMainClientToBranchShipmentId(shipment);
    if (shipmentReminders[id] !== undefined) {
        let reminder = shipmentReminders[id];
        return reminder < 0 ? 0 : reminder;
    }
    
    return totalPrice;
}


function getShipmentPaidAmount(shipment) {
    // اول از متغیر سراسری shipmentPayments چک کن
    if (shipment.uniqueKey && shipmentPayments[shipment.uniqueKey] !== undefined) {
        return shipmentPayments[shipment.uniqueKey];
    }
    
    // اگر نه، از محاسبه محلی استفاده کن
    let total = shipment.sellingPrice * shipment.qty;
    let reminder = getShipmentReminder(shipment);
    let paid = total - reminder;
    return paid < 0 ? 0 : paid;
}


function getShipmentStatus(shipment) {
    let totalPrice = shipment.sellingPrice * shipment.qty;
    let paidAmount = getShipmentPaidAmount(shipment);
    
    // ✅ اگر paidAmount >= totalPrice باشد، PAID است
    if (paidAmount >= totalPrice) {
        return 'paid';
    }
    
    let reminder = totalPrice - paidAmount;
    
    // با در نظر گرفتن خطای گرد کردن اعداد
    if (Math.abs(reminder) < 0.01) {
        return 'paid';
    }
    
    if (reminder <= 0) return 'paid';
    if (reminder < totalPrice) return 'partial';
    return 'unpaid';
}

function updateShipmentReminder(shipment, paymentAmount) {
    let id = generateMainClientToBranchShipmentId(shipment);
    let currentReminder = getShipmentReminder(shipment);
    let newReminder = currentReminder - paymentAmount;
    
    if (Math.abs(newReminder) < 0.01) {
        newReminder = 0;
    }
    if (newReminder < 0) newReminder = 0;
    
    shipmentReminders[id] = newReminder;
    
    let isFullyPaid = newReminder <= 0;
    let totalPrice = shipment.sellingPrice * shipment.qty;
    let paidSoFar = totalPrice - newReminder;
    
    if (shipment.uniqueKey) {
        shipmentPayments[shipment.uniqueKey] = paidSoFar;
    }
    
    updateDailyPayment(shipment.date, shipment, isFullyPaid, paidSoFar);
    saveData();
}
     

function updateDailyPayment(date, shipment, isPaid, amount) {
    let key = `${date}`;
    if (!dailyPayments[key]) {
        dailyPayments[key] = {
            date: date,
            totalPaid: 0,
            totalUnpaid: 0,
            shipments: []
        };
    }
    
    let dailyRecord = dailyPayments[key];
    let shipmentId = generateMainClientToBranchShipmentId(shipment);
    let totalPrice = shipment.sellingPrice * shipment.qty;  // Changed to sellingPrice
    
    let existingShipment = dailyRecord.shipments.find(s => s.id === shipmentId);
    
    if (existingShipment) {
        let oldPaid = existingShipment.paidAmount;
        let oldUnpaid = existingShipment.totalPrice - oldPaid;
        
        dailyRecord.totalPaid = dailyRecord.totalPaid - oldPaid + (isPaid ? amount : 0);
        dailyRecord.totalUnpaid = dailyRecord.totalUnpaid - oldUnpaid + (!isPaid ? amount : 0);
        
        existingShipment.paidAmount = isPaid ? amount : 0;
        existingShipment.unpaidAmount = !isPaid ? amount : 0;
        existingShipment.isPaid = isPaid;
    } else {
        dailyRecord.shipments.push({
            id: shipmentId,
            date: shipment.date,
            branch: shipment.branch,
            item: shipment.item,
            qty: shipment.qty,
            totalPrice: totalPrice,  // Changed to sellingPrice
            paidAmount: isPaid ? amount : 0,
            unpaidAmount: !isPaid ? amount : 0,
            isPaid: isPaid
        });
        
        if (isPaid) {
            dailyRecord.totalPaid += amount;
        } else {
            dailyRecord.totalUnpaid += amount;
        }
    }
    
    saveData();
}

                result.push(dailyPayments[key]);
            });
            return result.sort((a,b) => new Date(b.date) - new Date(a.date));
        }

async function getMainClientItems() {
    // دریافت distributed quantities از دیتابیس
    try {
        const distRes = await fetch(`/api/main-client-distributed/${currentUser.username}`);
        if (distRes.ok) {
            const distData = await distRes.json();
            for (const item of distData) {
                mainClientDistributed[item.item_name] = parseInt(item.distributed_quantity);
            }
        }
    } catch (err) {
        console.log('Error loading distributed:', err);
    }
    
    // همگام‌سازی با mainInventory
    if (mainClientItems.length !== mainInventory.length && mainInventory.length > 0) {
        mainClientItems = mainInventory.map(item => ({
            id: item.id,
            name: item.name,
            sellingPrice: item.sellingPrice,
            purchasePrice: item.purchasePrice,
            quantity: item.quantity,
            date: item.date || getTodayDate(),
            supplier: item.supplier
        }));
    }
    
    let results = [];
    for (let item of mainClientItems) {
        let distributed = mainClientDistributed[item.name] || 0;
        let remainingQuantity = item.quantity - distributed;
        
        if (remainingQuantity < 0) remainingQuantity = 0;
        
        let isReturnedItem = item.supplier && item.supplier.includes('Returned from');
        
        let isPaid;
        if (isReturnedItem) {
            isPaid = true;
        } else {
            isPaid = await isMainClientItemPaid(item);
        }
        
        results.push({
            ...item,
            paid: isPaid,
            originalPaid: isReturnedItem ? true : isPaid,
            distributed: distributed,
            remainingQuantity: remainingQuantity,
            totalValue: (item.sellingPrice || 0) * remainingQuantity,
            discount: getItemDiscount(item.name)
        });
    }
    return results;
}


function calculateRemainingStockInMainClients(itemName) {

        if (mainItem.name === itemName) {
            let distributed = mainClientDistributed[mainItem.name] || 0;
            let remaining = (mainItem.quantity || 0) - distributed;
            if (remaining > 0) {
                totalRemaining += remaining;
            }
            console.log(`Item: ${mainItem.name}, ID: ${mainItem.id}, Quantity: ${mainItem.quantity}, Distributed: ${distributed}, Remaining: ${remaining}`);
        }
    }
    
    console.log(`Total remaining for ${itemName}: ${totalRemaining}`);
    return totalRemaining;
}

            let shipments = getBranchShipments(branch);
            let totalItems = shipments.length;
            let totalValue = shipments.reduce((sum, s) => sum + s.totalPrice, 0);
            let totalPaid = shipments.reduce((sum, s) => sum + s.paidAmount, 0);
            let totalUnpaid = totalValue - totalPaid;
            let paidItems = shipments.filter(s => s.status === 'paid').length;
            let partialItems = shipments.filter(s => s.status === 'partial').length;
            
            return { totalItems, totalValue, totalPaid, totalUnpaid, paidItems, partialItems };
        }

        function getBranchSalesSummary(branch) {
            let branchSales = salesHistory.filter(s => s.branch === branch);
            let totalItemsSold = branchSales.reduce((sum, s) => sum + s.qty, 0);
            let totalRevenue = branchSales.reduce((sum, s) => sum + s.revenue, 0);
            let totalCost = branchSales.reduce((sum, s) => sum + (s.cost || 0), 0);
            let totalProfit = branchSales.reduce((sum, s) => sum + (s.profit || 0), 0);
            
            return { totalItemsSold, totalRevenue, totalCost, totalProfit };
        }

        function getBranchReceivedSummary(branch) {
            let receivedShipments = mainClientToBranchShipments.filter(s => s.branch === branch);
            let totalItemsReceived = receivedShipments.reduce((sum, s) => sum + s.qty, 0);
            let totalValueReceived = receivedShipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty), 0);  // ✅
            return { totalItemsReceived, totalValueReceived };
        }

        // ==================== RETURN FUNCTIONS ====================
        function generateReturnId(returnRequest) {
            return `${returnRequest.date}_${returnRequest.branch}_${returnRequest.itemName}_${returnRequest.quantity}`;
        }

        function getReturnStatus(returnRequest) {
            if (returnRequest.status) return returnRequest.status;
            if (returnRequest.paid) return 'paid';
            if (returnRequest.approved) return 'approved';
            if (returnRequest.rejected) return 'rejected';
            return 'pending';
        }

        function getBranchReturns(branch) {
            return branchReturns.filter(r => r.branch === branch).map(r => ({
                ...r,
                status: getReturnStatus(r),
                totalValue: r.quantity * r.pricePerUnit
            }));
        }

        function getMainClientReturns() {
            return branchReturns.map(r => ({
                ...r,
                status: getReturnStatus(r),
                totalValue: r.quantity * r.pricePerUnit
            }));
        }

        function getReturnSummary() {
            let returns = getMainClientReturns();
            let totalReturns = returns.length;
            let pendingReturns = returns.filter(r => r.status === 'pending').length;
            let approvedReturns = returns.filter(r => r.status === 'approved').length;
            let paidReturns = returns.filter(r => r.status === 'paid').length;
            let rejectedReturns = returns.filter(r => r.status === 'rejected').length;
            let totalValue = returns.reduce((sum, r) => sum + r.totalValue, 0);
            let totalPaid = returns.filter(r => r.paid).reduce((sum, r) => sum + r.totalValue, 0);
            
            return { totalReturns, pendingReturns, approvedReturns, paidReturns, rejectedReturns, totalValue, totalPaid };
        }

        // ==================== ALL BRANCHES SUMMARY ====================
        function getAllBranchesSummary() {
            let branches = getBranchUsers();
            let totalReceivedValue = 0;
            let totalPaid = 0;
            let totalUnpaid = 0;
            let totalSold = 0;
            let totalRevenue = 0;
            let totalProfit = 0;
            
            branches.forEach(branch => {
                let branchShipments = mainClientToBranchShipments.filter(s => s.branch === branch.username);
                
                branchShipments.forEach(shipment => {
                    totalReceivedValue += shipment.sellingPrice * shipment.qty;  // ✅ Changed to sellingPrice
                    totalPaid += getShipmentPaidAmount(shipment);
                });
                
                let branchSales = salesHistory.filter(s => s.branch === branch.username);
                branchSales.forEach(sale => {
                    totalSold += sale.qty;
                    totalRevenue += sale.revenue;
                    totalProfit += sale.profit || 0;
                });
            });
            
            totalUnpaid = totalReceivedValue - totalPaid;
            
            return {
                totalReceivedValue,
                totalPaid,
                totalUnpaid,
                totalSold,
                totalRevenue,
                totalProfit
            };
        }

        // ==================== CALCULATE FINANCE ====================
     

        function calculateTotalPurchaseValue() {
            let total = 0;
            for (let i = 0; i < mainInventory.length; i++) {
                const item = mainInventory[i];
                const qty = parseFloat(item.quantity) || 0;
                const price = parseFloat(item.purchase_price) || parseFloat(item.purchasePrice) || 0;
                total += price * qty;
            }
            return total;
        }

        function calculateTotalSaleValue() {
            let total = 0;
            for (let i = 0; i < mainInventory.length; i++) {
                const item = mainInventory[i];
                const qty = parseFloat(item.quantity) || 0;
                const price = parseFloat(item.selling_price) || parseFloat(item.sellingPrice) || 0;
                total += price * qty;
            }
            return total;
        }


        function recalcMainFinance() {
    // Calculate total purchase value (cost)
    let totalPurchase = 0;
    let totalSale = 0;
    
    for (let i = 0; i < mainInventory.length; i++) {
        const item = mainInventory[i];
        const qty = parseFloat(item.quantity) || 0;
        const purchasePrice = parseFloat(item.purchase_price) || parseFloat(item.purchasePrice) || 0;
        const sellingPrice = parseFloat(item.selling_price) || parseFloat(item.sellingPrice) || 0;
        
        totalPurchase += purchasePrice * qty;
        totalSale += sellingPrice * qty;
    }
    
    // Calculate total expenses
    let totalExpenses = 0;
    
    // Admin expenses
    for (let i = 0; i < expenses.length; i++) {
        totalExpenses += parseFloat(expenses[i].amount) || 0;
    }
    
    // Branch expenses
    for (const branch in branchExpenses) {
        if (branchExpenses[branch] && Array.isArray(branchExpenses[branch])) {
            for (let i = 0; i < branchExpenses[branch].length; i++) {
                totalExpenses += parseFloat(branchExpenses[branch][i].amount) || 0;
            }
        }
    }
    
    // Main client expenses
    for (const client in mainClientExpenses) {
        if (mainClientExpenses[client] && Array.isArray(mainClientExpenses[client])) {
            for (let i = 0; i < mainClientExpenses[client].length; i++) {
                totalExpenses += parseFloat(mainClientExpenses[client][i].amount) || 0;
            }
        }
    }
    
    mainFinance.totalPurchase = totalPurchase;
    mainFinance.totalSale = totalSale;
    mainFinance.totalExpenses = totalExpenses;
    mainFinance.totalProfit = totalSale - totalPurchase - totalExpenses;
    
    saveData();
}
        function recalcBranchFinance(branch) {
            if (!branchFinance[branch]) {
                branchFinance[branch] = { totalSale: 0, totalPurchase: 0, totalProfit: 0, totalLoss: 0, totalExpenses: 0 };
            }
            
            let branchSales = salesHistory.filter(s => s.branch === branch);
            branchFinance[branch].totalSale = branchSales.reduce((sum, s) => sum + (s.revenue || 0), 0);
            
            let branchShipments = mainClientToBranchShipments.filter(s => s.branch === branch);  // ✅ Correct array
            branchFinance[branch].totalPurchase = branchShipments.reduce((sum, s) => sum + ((s.sellingPrice || 0) * (s.qty || 0)), 0);  // ✅ sellingPrice
            
            let branchExps = branchExpenses[branch] || [];
            branchFinance[branch].totalExpenses = branchExps.reduce((sum, exp) => sum + (exp.amount || 0), 0);
            branchFinance[branch].totalProfit = branchFinance[branch].totalSale - branchFinance[branch].totalPurchase;
            
            saveData();
        }

            let type = document.getElementById('discountType').value;

                newPrice = originalPrice - amount;
                if (newPrice < 0) newPrice = 0;
            }
            
            document.getElementById('newPriceDisplay').value = formatMoney(newPrice);

function loadTotalAmount() {
    let branch = document.getElementById('totalAmountBranchSelect')?.value;
    
    // ذخیره مقدار قبلی total unpaid برای حفظ آن بعد از برگشت
    let previousTotalUnpaid = 0;
    let previousGrandTotal = 0;
    
    if (window._adminPreviousTotalUnpaid) {
        previousTotalUnpaid = window._adminPreviousTotalUnpaid;
    }
    if (window._adminPreviousGrandTotal) {
        previousGrandTotal = window._adminPreviousGrandTotal;
    }
    
    let shipments = mainClientToBranchShipments;
    if (branch) {
        shipments = shipments.filter(s => s.branch === branch);
    }
    
    // محاسبه grand total جدید
    let newGrandTotal = shipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty), 0);
    
    // محاسبه total paid از shipmentPayments
    let newTotalPaid = 0;
    for (let shipment of shipments) {
        if (shipment.uniqueKey && shipmentPayments[shipment.uniqueKey] !== undefined) {
            let paid = shipmentPayments[shipment.uniqueKey];
            let shipmentTotal = shipment.sellingPrice * shipment.qty;
            if (paid > shipmentTotal) {
                paid = shipmentTotal;
            }
            newTotalPaid += paid;
        } else {
            let paid = getShipmentPaidAmount(shipment);
            newTotalPaid += paid;
        }
    }
    
    if (newTotalPaid > newGrandTotal) {
        newTotalPaid = newGrandTotal;
    }
    
    // ✅ محاسبه total unpaid: از مقدار قبلی استفاده کن
    let newTotalUnpaid;
    if (previousTotalUnpaid > 0 && previousGrandTotal > 0) {
        newTotalUnpaid = previousTotalUnpaid;
    } else {
        newTotalUnpaid = newGrandTotal - newTotalPaid;
    }
    
    if (newTotalUnpaid < 0) newTotalUnpaid = 0;
    
    // ذخیره مقادیر فعلی برای استفاده بعدی
    window._adminPreviousTotalUnpaid = newTotalUnpaid;
    window._adminPreviousGrandTotal = newGrandTotal;
    
    console.log('=== Total Amount Admin Calculation ===');
    console.log('Grand Total:', newGrandTotal);
    console.log('Total Paid:', newTotalPaid);
    console.log('Total Unpaid:', newTotalUnpaid);
    
    let html = `
        <div id="totalAmountContainer">
            <div class="payment-summary">
                <h3><i class="fas fa-chart-pie"></i> Payment Summary ${branch ? 'for ' + branch + ' Branch' : 'for All Branches'}</h3>
                <div class="summary-stats" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="summary-item" style="background: linear-gradient(145deg, #3b82f6, #2563eb); color: white;">
                        <div class="label" style="color: rgba(255,255,255,0.8);">Grand Total</div>
                        <div class="value" style="color: white; font-size: 28px;">${formatMoney(newGrandTotal)}</div>
                    </div>
                    <div class="summary-item" style="background: linear-gradient(145deg, #22c55e, #16a34a); color: white;">
                        <div class="label" style="color: rgba(255,255,255,0.8);">Total Paid</div>
                        <div class="value" style="color: white; font-size: 28px;">${formatMoney(newTotalPaid)}</div>
                    </div>
                    <div class="summary-item" style="background: linear-gradient(145deg, #ef4444, #b91c1c); color: white;">
                        <div class="label" style="color: rgba(255,255,255,0.8);">Total Unpaid</div>
                        <div class="value" style="color: white; font-size: 28px;">${formatMoney(newTotalUnpaid)}</div>
                    </div>
                </div>
            </div>

    `;

    }

    return items.map((item, index) => {
        const purchasePrice = parseFloat(item.purchasePrice) || parseFloat(item.purchase_price) || 0;

        const totalSale = sellingPrice * quantity;

        let remainderInMainClients = calculateRemainingStockInMainClients(item.name);

window.saveNewItem = async function() {
    let name = document.getElementById('itemName').value.trim();
    let purchasePrice = parseFloat(document.getElementById('purchasePrice').value);
    let sellingPrice = parseFloat(document.getElementById('sellingPrice').value);
    let quantity = parseInt(document.getElementById('quantity').value);
    let supplier = document.getElementById('supplier').value.trim();
    let itemDate = document.getElementById('itemDate').value;
    
    if (!name || isNaN(purchasePrice) || purchasePrice < 0 || isNaN(sellingPrice) || sellingPrice < 0 || isNaN(quantity) || quantity < 0 || !supplier) {
        alert('Please fill all fields correctly');
        return;
    }
    const saveBtn = document.querySelector('#modalContent .save-btn');
    if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    }
    
    try {
        const response = await fetch('/api/inventory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                purchase_price: purchasePrice,
                selling_price: sellingPrice,
                quantity: quantity,
                supplier: supplier,
                date: itemDate
            })
        });
        
        if (response.ok) {
            const newItem = await response.json();
            console.log('Item added to database:', newItem);
            
            // ✅ اضافه کردن به mainInventory
            mainInventory.push({
                id: newItem.id,
                name: name,
                purchasePrice: purchasePrice,
                sellingPrice: sellingPrice,
                quantity: quantity,
                supplier: supplier,
                date: itemDate
            });
            
            // ✅ اضافه کردن به mainClientItems (به عنوان یک رکورد جدید جداگانه)
            mainClientItems.push({
                id: newItem.id,
                name: name,
                sellingPrice: sellingPrice,
                purchasePrice: purchasePrice,
                quantity: quantity,
                date: itemDate,
                supplier: supplier
            });
            
            closeModal();
            
            // رفرش دیتا از دیتابیس
            await refreshDataFromServer();
            
            if (currentUser.role === 'admin') {
                renderInventory();
            } else if (currentUser.role === 'mainclient') {
                renderMainClientInventory();
            }
            
            alert(`Item "${name}" added successfully!`);
        } else {
            const error = await response.json();
            alert('Failed to add item: ' + error.error);
        }
    } catch (error) {
        if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Save Item';
        }
        console.error('Error adding item:', error);
        alert('Failed to add item. Make sure server is running.');
    }
};

        function calculateMonthlyExpenses() {
            let currentDate = new Date();
            let currentMonth = currentDate.getMonth();
            let currentYear = currentDate.getFullYear();
            
            return expenses.filter(exp => {
                let expDate = new Date(exp.date);
                return expDate.getMonth() === currentMonth && expDate.getFullYear() === currentYear;
            }).reduce((sum, exp) => sum + exp.amount, 0);
        }

        function calculateDailyAverage() {
            let total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            if (expenses.length === 0) return 0;
            
            let dates = expenses.map(exp => new Date(exp.date).getTime());
            let minDate = Math.min(...dates);
            let maxDate = Math.max(...dates);
            let daysDiff = (maxDate - minDate) / (1000 * 60 * 60 * 24) || 1;
            
            return total / daysDiff;
        }

window.saveNewExpense = async function() {
    const btn = document.querySelector('#modalContent .save-btn') 
         || document.querySelector('#distributeBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Please wait...'; }

    let newExpense = {
        date: document.getElementById('expDate').value,
        category: document.getElementById('expCategory').value,
        amount: parseFloat(document.getElementById('expAmount').value),
        description: document.getElementById('expDescription').value,
        user_role: 'admin',
        username: currentUser ? currentUser.username : 'admin'
    };
    
    if (isNaN(newExpense.amount) || newExpense.amount <= 0) {
        alert('Please enter a valid amount');
        return;
    }
    
    try {
        const response = await fetch('/api/expenses', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newExpense)
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to save expense');
        }
        
        const savedExpense = await response.json();
        console.log('Expense saved to database:', savedExpense);
        
        // Add to local array (only admin expenses)
        expenses.push({
            id: savedExpense.id,
            date: newExpense.date,
            category: newExpense.category,
            amount: newExpense.amount,
            description: newExpense.description,
            user_role: 'admin',
            username: 'admin'
        });
        
        recalcMainFinance();
        closeModal();
        renderExpenses();
        
        alert('Expense added successfully!');
    } catch (error) {
        if (btn) { btn.disabled = false; btn.textContent = 'real text'; }

        console.error('Error adding expense:', error);
        alert('Failed to add expense. Make sure server is running.');
    }

window.updateExpense = async function(id) {
    let exp = expenses.find(e => e.id === id);
    if (!exp) return;
    
    let updatedExpense = {
        date: document.getElementById('expDate').value,
        category: document.getElementById('expCategory').value,
        amount: parseFloat(document.getElementById('expAmount').value),
        description: document.getElementById('expDescription').value,
        user_role: 'admin',
        username: currentUser ? currentUser.username : 'admin'
    };
    
    try {
        // Update in database via API
        const response = await fetch(`/api/expenses/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedExpense)
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to update expense');
        }
        
        // Update local array
        exp.date = updatedExpense.date;
        exp.category = updatedExpense.category;
        exp.amount = updatedExpense.amount;
        exp.description = updatedExpense.description;
        
        recalcMainFinance();
        closeModal();
        renderExpenses();
        
        alert('Expense updated successfully!');
    } catch (error) {
        console.error('Error updating expense:', error);
        alert('Failed to update expense.');
    }
};

window.deleteExpense = async function(id) {
    if (confirm('Are you sure you want to delete this expense?')) {
        try {
            // Delete from database via API
            const response = await fetch(`/api/expenses/${id}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to delete expense');
            }
            
            // Remove from local array
            expenses = expenses.filter(e => e.id !== id);
            
            recalcMainFinance();
            
            let activeSection = document.querySelector('.nav-item.active')?.innerText.toLowerCase();
            if (activeSection && activeSection.includes('expenses')) {
                renderExpenses();
            } else if (activeSection && activeSection.includes('finance')) {
                renderFinance();
            } else if (activeSection && activeSection.includes('reports')) {
                renderAdminReports();
            }
            
            alert('Expense deleted successfully!');
        } catch (error) {
            console.error('Error deleting expense:', error);
            alert('Failed to delete expense.');
        }
    }
};

        function renderBranchExpenseBreakdown(expenses) {
            let categories = {};
            expenses.forEach(exp => {
                if (!categories[exp.category]) {
                    categories[exp.category] = 0;
                }
                categories[exp.category] += exp.amount;
            });
            
            let total = Object.values(categories).reduce((sum, val) => sum + val, 0);
            
            return Object.entries(categories).map(([category, amount]) => `
                <div class="expense-category">
                    <span class="category-name">${category}</span>
                    <span class="category-amount">${formatMoney(amount)} (${Math.round((amount/total)*100)}%)</span>
                </div>
            `).join('');
        }

        window.loadAdminBranchPayments = async function() {
    let mainClient = document.getElementById('adminPaymentMainClientSelect').value;
    let branch = document.getElementById('adminPaymentBranchSelect').value;
    let period = document.getElementById('adminPaymentTimePeriod').value;

    let endDate = new Date();
    let startDate = new Date();

    if (period === 'daily') {
        startDate = new Date(endDate);
        startDate.setHours(0, 0, 0, 0);
    } else if (period === 'weekly') {
        startDate.setDate(endDate.getDate() - 7);
    } else if (period === 'monthly') {
        startDate.setMonth(endDate.getMonth() - 1);
    } else if (period === 'custom') {
        startDate = new Date(document.getElementById('adminPaymentStartDate').value);
        endDate = new Date(document.getElementById('adminPaymentEndDate').value);
        endDate.setHours(23, 59, 59, 999);
    } else {
        startDate = new Date(2000, 0, 1);
    }

    // رفرش داده‌ها از دیتابیس
    await refreshDataFromServer();

    let allShipments = [...mainClientToBranchShipments];
    
    if (branch) {
        allShipments = allShipments.filter(s => s.branch === branch);
    }

    let filteredShipments = allShipments.filter(s => {
        let shipmentDate = new Date(s.date);
        return shipmentDate >= startDate && shipmentDate <= endDate;
    });

    displayAdminBranchPayments(filteredShipments, mainClient, branch);
};
       



        function displayAdminBranchPayments(shipments, mainClient, branch) {
    // محاسبه مجدد با استفاده از توابع صحیح
    let shipmentsWithStatus = shipments.map(s => {
        let totalPrice = s.sellingPrice * s.qty;
        let paidAmount = getShipmentPaidAmount(s);
        let reminder = totalPrice - paidAmount;
        let status = reminder <= 0 ? 'paid' : (paidAmount > 0 ? 'partial' : 'unpaid');
        
        return {
            ...s,
            totalPrice: totalPrice,
            paidAmount: paidAmount,
            reminder: reminder,
            status: status
        };
    });
    
    let totalValue = shipmentsWithStatus.reduce((sum, s) => sum + s.totalPrice, 0);
    let totalPaid = shipmentsWithStatus.reduce((sum, s) => sum + s.paidAmount, 0);
    let totalUnpaid = totalValue - totalPaid;
    let paidCount = shipmentsWithStatus.filter(s => s.status === 'paid').length;
    let partialCount = shipmentsWithStatus.filter(s => s.status === 'partial').length;
    let unpaidCount = shipmentsWithStatus.filter(s => s.status === 'unpaid').length;

    let html = `
        <div id="adminPaymentsContainer">
            <div class="payment-summary">
                <h3><i class="fas fa-chart-pie"></i> Payment Summary</h3>
                <div class="summary-stats" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="summary-item">
                        <div class="label">Main Client</div>
                        <div class="value">${mainClient || 'All Main Clients'}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Branch</div>
                        <div class="value">${branch || 'All Branches'}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Total Shipments</div>
                        <div class="value">${shipmentsWithStatus.length}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Paid</div>
                        <div class="value" style="color: #22c55e;">${paidCount}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Partial</div>
                        <div class="value" style="color: #f59e0b;">${partialCount}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Unpaid</div>
                        <div class="value" style="color: #ef4444;">${unpaidCount}</div>
                    </div>
                </div>
                <div class="summary-stats" style="grid-template-columns: repeat(3, 1fr); margin-top: 20px;">
                    <div class="summary-item">
                        <div class="label">Total Value</div>
                        <div class="value">${formatMoney(totalValue)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Total Paid</div>
                        <div class="value" style="color: #22c55e;">${formatMoney(totalPaid)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">Total Unpaid</div>
                        <div class="value" style="color: #ef4444;">${formatMoney(totalUnpaid)}</div>
                    </div>
                </div>
            </div>

            <h3 style="margin-bottom: 20px;">Payment Details</h3>
    `;

    if (shipmentsWithStatus.length === 0) {
        html += `
            <div class="empty-state">
                <i class="fas fa-box"></i>
                <h3>No Shipments Found</h3>
                <p>No shipments match your filter criteria.</p>
            </div>
        `;
    } else {
        html += `
            <div class="table-wrapper">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Branch</th>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Selling Price</th>
                            <th>Total Price</th>
                            <th>Paid Amount</th>
                            <th>Remaining</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${shipmentsWithStatus.sort((a,b) => new Date(b.date) - new Date(a.date)).map(s => {
                            let statusClass = s.status === 'paid' ? 'badge-paid' : (s.status === 'partial' ? 'badge-partial' : 'badge-unpaid');
                            let statusText = s.status === 'paid' ? 'PAID' : (s.status === 'partial' ? 'PARTIAL' : 'UNPAID');
                            return `
                                <tr>
                                    <td>${s.date}</div>
                                    <td>${s.branch}</div>
                                    <td>${s.item}</div>
                                    <td>${s.qty}</div>
                                    <td>${formatMoney(s.sellingPrice)}</div>
                                    <td class="total-value">${formatMoney(s.totalPrice)}</div>
                                    <td class="${s.status === 'paid' ? 'status-paid' : 'status-unpaid'}">${formatMoney(s.paidAmount)}</div>
                                    <td class="${s.status === 'paid' ? 'status-paid' : 'reminder-amount'}">${formatMoney(s.reminder)}</div>
                                    <td>
                                        <span class="badge ${statusClass}">
                                            ${statusText}
                                        </span>
                                     </div>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                    <tfoot>
                        <tr class="grand-total">
                            <td colspan="5"><strong>Grand Total</strong></div>
                            <td><strong>${formatMoney(totalValue)}</strong></div>
                            <td><strong>${formatMoney(totalPaid)}</strong></div>
                            <td><strong>${formatMoney(totalUnpaid)}</strong></div>
                            <td></div>
                        </tr>
                    </tfoot>
                </table>
            </div>
        `;
    }

    html += `</div>`;

    document.getElementById('adminPaymentsContainer').style.display = 'block';
    document.getElementById('adminPaymentsContainer').innerHTML = html;
}

        window.deleteAdminInvoice = async function(invoiceId) {
    if (confirm('Are you sure you want to delete this invoice? This action cannot be undone!')) {
        try {
            const response = await fetch(`/api/invoices/${invoiceId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                // حذف از آرایه محلی
                invoices = invoices.filter(inv => inv.id !== invoiceId);
                // رفرش صفحه
                renderAdminInvoices();
                alert('Invoice deleted successfully!');
            } else {
                const error = await response.json();
                alert('Failed to delete invoice: ' + error.error);
            }
        } catch (err) {
            console.error('Error deleting invoice:', err);
            alert('Failed to delete invoice. Make sure server is running.');
        }
    }
};

function renderMainClientInventoryRows(items) {
    return items.map((item, index) => {
        let distributedKey = `${item.name}`;
        let distributed = mainClientDistributed[distributedKey] || 0;
        let remainingQuantity = item.quantity - distributed;
        if (remainingQuantity < 0) remainingQuantity = 0;
        
        let totalValue = (item.sellingPrice || 0) * remainingQuantity;
        
        let isPaid = item.paid;
        let discount = getItemDiscount(item.name);
        
        let isReturnedItem = item.supplier && item.supplier.includes('Returned from');
        let shouldShowAsPaid = isPaid || isReturnedItem;
        
        let statusBadge = '';
        let actionButton = '';
        
        if (shouldShowAsPaid) {
            statusBadge = `<span class="badge badge-paid">PAID</span>`;
            actionButton = `<span class="badge" style="background: #22c55e; color: white;">✓ Ready</span>`;
        } else {
            statusBadge = `<span class="badge badge-unpaid">UNPAID</span>`;
            actionButton = `<button class="btn btn-success" onclick="markMainClientItemAsPaidFromInventory('${item.name}', ${item.quantity})">
                                <i class="fas fa-check"></i> Pay Now
                            </button>`;
        }
        
        return `
            <tr>
                <td>${index + 1}</td>
                <td>${item.date || '-'}</td>
                <td>${item.name}</td>
                <td>${renderPriceWithDiscount(discount ? discount.originalPrice : item.sellingPrice, item.sellingPrice, item.name)}</td>
                <td>${discount ? `<span class="discount-badge">-${discount.discountPercent}%</span>` : '-'}</td>
                <td>${item.quantity}</td>
                <td class="remainder-stock">${remainingQuantity}</td>
                <td class="total-value">${formatMoney(totalValue)}</div>
                <td>${statusBadge}</div>
                <td>${actionButton}</div>
            </tr>
        `;
    }).join('');
}

function loadTotalAmountMain() {
    let branch = document.getElementById('totalAmountBranchSelectMain')?.value;
    
    // ذخیره مقدار قبلی total unpaid برای حفظ آن بعد از برگشت
    let previousTotalUnpaid = 0;
    let previousGrandTotal = 0;
    
    // اگر قبلاً مقداری ذخیره شده بود، بازیابی کن
    if (window._previousTotalUnpaid) {
        previousTotalUnpaid = window._previousTotalUnpaid;
    }
    if (window._previousGrandTotal) {
        previousGrandTotal = window._previousGrandTotal;
    }
    
    let shipments = mainClientToBranchShipments;
    if (branch) {
        shipments = shipments.filter(s => s.branch === branch);
    }
    
    // محاسبه grand total جدید
    let newGrandTotal = shipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty), 0);
    
    // محاسبه total paid از shipmentPayments
    let newTotalPaid = 0;
    for (let shipment of shipments) {
        if (shipment.uniqueKey && shipmentPayments[shipment.uniqueKey] !== undefined) {
            let paid = shipmentPayments[shipment.uniqueKey];
            let shipmentTotal = shipment.sellingPrice * shipment.qty;
            if (paid > shipmentTotal) {
                paid = shipmentTotal;
            }
            newTotalPaid += paid;
        } else {
            let paid = getShipmentPaidAmount(shipment);
            newTotalPaid += paid;
        }
    }
    
    if (newTotalPaid > newGrandTotal) {
        newTotalPaid = newGrandTotal;
    }
    
    // ✅ محاسبه total unpaid: از مقدار قبلی استفاده کن اگر تغییر نکرده
    // اگر grand total و total paid به یک نسبت کاهش یافته‌اند، total unpaid باید ثابت بماند
    let reduction = previousGrandTotal - newGrandTotal;
    let paidReduction = previousTotalUnpaid ? 0 : 0;
    
    let newTotalUnpaid;
    if (previousTotalUnpaid > 0 && previousGrandTotal > 0) {
        // اگر قبلاً مقداری داشتیم، همان مقدار را حفظ کن
        newTotalUnpaid = previousTotalUnpaid;
    } else {
        // در غیر این صورت محاسبه کن
        newTotalUnpaid = newGrandTotal - newTotalPaid;
    }
    
    if (newTotalUnpaid < 0) newTotalUnpaid = 0;
    
    // ذخیره مقادیر فعلی برای استفاده بعدی
    window._previousTotalUnpaid = newTotalUnpaid;
    window._previousGrandTotal = newGrandTotal;
    
    console.log('=== Total Amount Main Calculation ===');
    console.log('Grand Total:', newGrandTotal);
    console.log('Total Paid:', newTotalPaid);
    console.log('Total Unpaid:', newTotalUnpaid);
    console.log('Reduction:', reduction);
    
    let html = `
        <div id="totalAmountContainerMain">
            <div class="payment-summary">
                <h3><i class="fas fa-chart-pie"></i> Payment Summary ${branch ? 'for ' + branch + ' Branch' : 'for All Branches'}</h3>
                <div class="summary-stats" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="summary-item" style="background: linear-gradient(145deg, #3b82f6, #2563eb); color: white;">
                        <div class="label" style="color: rgba(255,255,255,0.8);">Grand Total</div>
                        <div class="value" style="color: white; font-size: 28px;">${formatMoney(newGrandTotal)}</div>
                    </div>
                    <div class="summary-item" style="background: linear-gradient(145deg, #22c55e, #16a34a); color: white;">
                        <div class="label" style="color: rgba(255,255,255,0.8);">Total Paid</div>
                        <div class="value" style="color: white; font-size: 28px;">${formatMoney(newTotalPaid)}</div>
                    </div>
                    <div class="summary-item" style="background: linear-gradient(145deg, #ef4444, #b91c1c); color: white;">
                        <div class="label" style="color: rgba(255,255,255,0.8);">Total Unpaid</div>
                        <div class="value" style="color: white; font-size: 28px;">${formatMoney(newTotalUnpaid)}</div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    let container = document.getElementById('totalAmountContainerMainResult');
    if (container) {
        container.style.display = 'block';
        container.innerHTML = html;
    } else {
        let oldContainer = document.getElementById('totalAmountContainerMain');
        if (oldContainer) {
            oldContainer.style.display = 'block';
            oldContainer.innerHTML = html;
        }
    }
}

                let expDate = new Date(exp.date);
                return expDate.getMonth() === currentMonth && expDate.getFullYear() === currentYear;
            }).reduce((sum, exp) => sum + exp.amount, 0);

window.updateMainClientExpense = async function(id) {
    let mainClient = currentUser.username;
    let exp = mainClientExpenses[mainClient]?.find(e => e.id === id);
    if (!exp) return;
    
    let updatedExpense = {
        date: document.getElementById('mainClientExpDate').value,
        category: document.getElementById('mainClientExpCategory').value,
        amount: parseFloat(document.getElementById('mainClientExpAmount').value),
        description: document.getElementById('mainClientExpDescription').value,
        user_role: 'mainclient',
        username: mainClient
    };
    
    try {
        const response = await fetch(`/api/expenses/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedExpense)
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to update expense');
        }
        
        // به روز رسانی محلی
        exp.date = updatedExpense.date;
        exp.category = updatedExpense.category;
        exp.amount = updatedExpense.amount;
        exp.description = updatedExpense.description;
        
        closeModal();
        renderMainClientExpenses();

        console.error('Error updating expense:', error);
        alert('Failed to update expense: ' + error.message);

};


window.deleteMainClientExpense = async function(id) {
    if (confirm('Are you sure you want to delete this expense?')) {
        let mainClient = currentUser.username;
        
        try {
            const response = await fetch(`/api/expenses/${id}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to delete expense');
            }
            
            // حذف از متغیر محلی
            mainClientExpenses[mainClient] = mainClientExpenses[mainClient].filter(e => e.id !== id);
            
            renderMainClientExpenses();
            
            alert('Expense deleted successfully!');
        } catch (error) {
            console.error('Error deleting expense:', error);
            alert('Failed to delete expense: ' + error.message);
        }
    }
};

window.loadPaymentsByDate = async function() {
    let branch = document.getElementById('paymentBranchSelect').value;
    let mode = document.getElementById('paymentViewMode')?.value || 'date';
    let date = document.getElementById('paymentDate')?.value;

    if (!date) date = getTodayDate();
    
    let selectedDate = formatDateForCompare(date);

    await refreshDataFromServer();

    let allShipments = [...mainClientToBranchShipments];
    
    if (branch) {
        allShipments = allShipments.filter(s => s.branch === branch);
    }

    // اگر all time باشد همه shipments را نشان بده
    let filteredShipments = (mode === 'alltime' ? allShipments : allShipments.filter(s => s.date === selectedDate)).map(s => {
        let totalPrice = s.sellingPrice * s.qty;
        let paidAmount = 0;
        
        // دریافت paidAmount از shipmentPayments
        if (s.uniqueKey && shipmentPayments[s.uniqueKey] !== undefined) {
            paidAmount = shipmentPayments[s.uniqueKey];
        } else {
            paidAmount = getShipmentPaidAmount(s);
        }
        
        // محدود کردن paidAmount به totalPrice
        if (paidAmount > totalPrice) {
            paidAmount = totalPrice;
        }
        
        let unpaidAmount = totalPrice - paidAmount;
        if (unpaidAmount < 0) unpaidAmount = 0;
        
        let status = 'unpaid';
        if (paidAmount >= totalPrice) {
            status = 'paid';
        } else if (paidAmount > 0) {
            status = 'partial';
        }
        
        return {
            ...s,

window.processBulkPayment = async function(date) {
    let paymentAmount = parseFloat(document.getElementById('bulkPaymentAmount').value);
    let description = document.getElementById('bulkPaymentDescription').value;
    let branch = document.getElementById('paymentBranchSelect').value;

    if (isNaN(paymentAmount) || paymentAmount <= 0) {
        alert('Please enter a valid payment amount');
        return;
    }

    let shipments = mainClientToBranchShipments
        .filter(s => s.date === date && (!branch || s.branch === branch));

    let totalUnpaid = shipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty - getShipmentPaidAmount(s)), 0);

    if (paymentAmount > totalUnpaid) {
        alert(`Payment amount cannot exceed ${formatMoney(totalUnpaid)}`);
        return;
    }

    let remainingPayment = paymentAmount;
    


    let sortedShipments = [...shipments].sort((a, b) => new Date(a.date) - new Date(b.date));

    for (const shipment of sortedShipments) {
        if (remainingPayment <= 0) break;
        
        let totalPrice = shipment.sellingPrice * shipment.qty;
        let paidSoFar = getShipmentPaidAmount(shipment);
        let shipmentReminder = totalPrice - paidSoFar;
        
        if (shipmentReminder <= 0) continue;
        
        let paymentForThisShipment = Math.min(remainingPayment, shipmentReminder);
        
        await processShipmentPayment(shipment, paymentForThisShipment);
        
        remainingPayment -= paymentForThisShipment;
    }
    closeModal();
    
    // ✅ دیتا را از دیتابیس رفرش کن
    await refreshDataFromServer();
    await loadPaymentsByDate();
    
    alert(`✅ Bulk payment of ${formatMoney(paymentAmount)} processed successfully for ${date}!`);
};

window.processPayment = async function(branch, date, item, qty, price) {
    let paymentAmount = parseFloat(document.getElementById('paymentAmount').value);
    
    if (isNaN(paymentAmount) || paymentAmount <= 0) {
        alert('Please enter a valid payment amount');
        return;
    }

    let shipment = mainClientToBranchShipments.find(s => 
        s.branch === branch && 
        s.date === date && 
        s.item === item && 
        s.qty === qty
    );
    
    if (!shipment) {
        alert('Shipment not found!');
        return;
    }

    let totalPrice = shipment.sellingPrice * qty;
    let currentPaid = getShipmentPaidAmount(shipment);
    let currentReminder = totalPrice - currentPaid;
    
    if (paymentAmount > currentReminder) {
        alert(`Payment amount cannot exceed ${formatMoney(currentReminder)}`);
        return;
    }

    // پرداخت را ذخیره کن
    const success = await processShipmentPayment(shipment, paymentAmount);
    
    if (success) {
        closeModal();
        
        // رفرش داده‌ها از دیتابیس
        await refreshDataFromServer();
        
        // دوباره بارگذاری پرداخت‌ها
        await loadPaymentsByDate();
        
        if (paymentAmount >= currentReminder) {
            alert(`✅ Payment of ${formatMoney(paymentAmount)} processed successfully! Bill is now fully paid.`);
        } else {
            alert(`✅ Payment of ${formatMoney(paymentAmount)} processed successfully! Remaining balance: ${formatMoney(currentReminder - paymentAmount)}`);
        }
    } else {
        alert('Failed to process payment. Please try again.');
    }
};

async function processShipmentPayment(shipment, paymentAmount) {
    if (!shipment.uniqueKey) {
        console.error('Shipment has no uniqueKey:', shipment);
        return false;
    }
    
    try {
        const response = await fetch('/api/shipment-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                shipment_id: shipment.uniqueKey, 
                paid_amount: paymentAmount 
            })
        });
        
        if (!response.ok) {
            const error = await response.text();
            console.error('Server error:', error);
            return false;
        }
        
        const result = await response.json();
        console.log('Payment saved:', result);
        
        // به روز رسانی متغیر محلی shipmentPayments
        if (!shipmentPayments[shipment.uniqueKey]) {
            shipmentPayments[shipment.uniqueKey] = 0;
        }
        shipmentPayments[shipment.uniqueKey] += paymentAmount;
        
        // به روز رسانی reminder محلی
        let totalPrice = shipment.sellingPrice * shipment.qty;
        let shipmentId = `${shipment.date}_${shipment.branch}_${shipment.item}_${shipment.qty}`;
        let newReminder = totalPrice - shipmentPayments[shipment.uniqueKey];
        if (newReminder < 0) newReminder = 0;
        shipmentReminders[shipmentId] = newReminder;
        
        return true;
    } catch (err) {
        console.error('Error processing payment:', err);
        return false;
    }
}

        window.generateInvoice = async function(branch, date) {
    let invoiceNumber = document.getElementById('invoiceNumberInput').value;
    
    if (!invoiceNumber.trim()) {
        alert('Please enter an invoice number');
        return;
    }

    let mainClient = currentUser.username;
    
    let dailyShipments = mainClientToBranchShipments.filter(s => 
        s.branch === branch && 
        s.date === date
    );

    let totalItems = dailyShipments.reduce((sum, s) => sum + s.qty, 0);
    let totalValue = dailyShipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty), 0);
    
    let allTimeShipments = mainClientToBranchShipments.filter(s => s.branch === branch);
    let allTimeTotalItems = allTimeShipments.reduce((sum, s) => sum + s.qty, 0);
    let allTimeTotalValue = allTimeShipments.reduce((sum, s) => sum + (s.sellingPrice * s.qty), 0);
    let allTimePaid = allTimeShipments.reduce((sum, s) => sum + getShipmentPaidAmount(s), 0);
    let allTimeUnpaid = allTimeTotalValue - allTimePaid;

    // ✅ ذخیره در دیتابیس
    try {
        const response = await fetch('/api/invoices', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                number: invoiceNumber,
                main_client: mainClient,
                branch: branch,
                date: date,
                total_items: totalItems,
                total_value: totalValue,
                all_time_total_items: allTimeTotalItems,
                all_time_total_value: allTimeTotalValue,
                all_time_paid: allTimePaid,
                all_time_unpaid: allTimeUnpaid,
                items: dailyShipments
            })
        });
        
        if (!response.ok) {
            throw new Error('Failed to save invoice');
        }
        
        const savedInvoice = await response.json();
        console.log('Invoice saved to database:', savedInvoice);
        
        // اضافه کردن به متغیر محلی
        invoices.push({
            number: invoiceNumber,
            mainClient: mainClient,
            branch: branch,
            date: date,
            shipments: dailyShipments,
            totalItems: totalItems,
            totalValue: totalValue,
            createdAt: new Date().toISOString(),
            allTimeTotalItems: allTimeTotalItems,
            allTimeTotalValue: allTimeTotalValue,
            allTimePaid: allTimePaid,
            allTimeUnpaid: allTimeUnpaid
        });
        
        // نمایش و چاپ فاکتور
        showInvoicePrint(invoiceNumber, mainClient, branch, date, dailyShipments, totalItems, totalValue, 
                         allTimeTotalItems, allTimeTotalValue, allTimePaid, allTimeUnpaid);
        
        closeModal();
        
    } catch (error) {
        console.error('Error saving invoice:', error);
        alert('Failed to save invoice: ' + error.message);
    }
};

window.generateBranchReport = async function() {
    let branch = document.getElementById('reportBranchSelect').value;
    let period = document.getElementById('reportTimePeriod').value;

    if (!branch) {
        alert('Please select a branch');
        return;
    }

    // رفرش داده‌ها از دیتابیس (این کار shipmentPayments را به روز می‌کند)
    await refreshDataFromServer();

    let today = new Date();
    let startDate, endDate;

    if (period === 'daily') {
        let todayStr = getTodayDate();
        startDate = new Date(todayStr + 'T00:00:00');
        endDate = new Date(todayStr + 'T23:59:59');
    } else if (period === 'weekly') {
        startDate = new Date(today);
        startDate.setDate(today.getDate() - 7);
        startDate.setHours(0, 0, 0, 0);
        endDate = new Date(today);
        endDate.setHours(23, 59, 59, 999);
    } else if (period === 'monthly') {
        startDate = new Date(today);
        startDate.setMonth(today.getMonth() - 1);
        startDate.setHours(0, 0, 0, 0);
        endDate = new Date(today);
        endDate.setHours(23, 59, 59, 999);
    } else if (period === 'custom') {
        startDate = new Date(document.getElementById('reportStartDate').value);
        startDate.setHours(0, 0, 0, 0);
        endDate = new Date(document.getElementById('reportEndDate').value);
        endDate.setHours(23, 59, 59, 999);
    } else {
        startDate = new Date(2000, 0, 1);
        endDate = new Date(today);
        endDate.setHours(23, 59, 59, 999);
    }

    await displayBranchReport(branch, startDate, endDate, period);
};

async function displayBranchReport(branch, startDate, endDate, period) {
    // دریافت داده‌ها از API
    let branchInv = [];
    let allShipments = [];
    let paymentMap = {};
    
    try {
        const branchInvRes = await fetch(`/api/branch-inventory/${branch}`);
        const branchInvData = await branchInvRes.json();
        branchInv = branchInvData.map(b => ({
            name: b.item_name,
            quantity: parseInt(b.quantity),
            sellingPrice: parseFloat(b.selling_price),
            purchasePrice: parseFloat(b.purchase_price)
        }));
        
        const shipmentsRes = await fetch('/api/shipments');
        const allShipmentsData = await shipmentsRes.json();
        allShipments = allShipmentsData
            .filter(s => s.branch === branch)
            .map(s => ({
                id: s.id,
                date: s.date,
                branch: s.branch,
                item: s.item,
                qty: parseInt(s.qty),
                sellingPrice: parseFloat(s.selling_price),
                purchasePrice: parseFloat(s.purchase_price),
                uniqueKey: s.unique_key
            }));
        
        // دریافت payment اطلاعات از shipmentPayments (که قبلاً در refresh لود شده)
        for (const shipment of allShipments) {
            if (shipment.uniqueKey && shipmentPayments[shipment.uniqueKey] !== undefined) {
                let paidAmount = shipmentPayments[shipment.uniqueKey];
                let totalPrice = (shipment.sellingPrice || 0) * (shipment.qty || 0);
                
                // محدود کردن paidAmount به totalPrice
                if (paidAmount > totalPrice) {
                    paidAmount = totalPrice;
                }
                
                paymentMap[shipment.uniqueKey] = {
                    paid_amount: paidAmount,
                    total_price: totalPrice
                };
            } else {
                paymentMap[shipment.uniqueKey] = {
                    paid_amount: 0,
                    total_price: (shipment.sellingPrice || 0) * (shipment.qty || 0)
                };
            }

function formatDateForCompare(dateString) {
    if (!dateString) return '';
    // اگر تاریخ به فرمت ISO است (2026-04-28T19:30:00.000Z)
    if (dateString.includes('T')) {
        return dateString.split('T')[0];
    }
    // اگر تاریخ به فرمت YYYY-MM-DD است
    if (dateString.match(/^\d{4}-\d{2}-\d{2}$/)) {
        return dateString;
    }
    // اگر تاریخ به فرمت دیگر است، تبدیل کن
    let date = new Date(dateString);
    if (!isNaN(date.getTime())) {
        return date.toISOString().split('T')[0];
    }
    return dateString;
}

window.approveReturn = async function(returnId) {
    console.log('Approving return ID:', returnId);
    
    let returnRequest = branchReturns.find(r => r.id === returnId);
    if (!returnRequest) {
        alert('Return request not found!');
        return;
    }
    
    if (!confirm(`Approve return of ${returnRequest.quantity} ${returnRequest.itemName} from ${returnRequest.branch}?`)) {
        return;
    }
    
    try {
        // 1. آپدیت وضعیت برگشت در دیتابیس
        const approveResponse = await fetch(`/api/returns/${returnId}/approve`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' }
        });
        
        if (!approveResponse.ok) {
            throw new Error(`Server returned ${approveResponse.status}`);
        }
        
        let branch = returnRequest.branch;
        let itemName = returnRequest.itemName;
        let quantity = returnRequest.quantity;
        let pricePerUnit = returnRequest.pricePerUnit;
        let returnValue = quantity * pricePerUnit;
        
        // ========== 2. آپدیت branch_inventory ==========
        const branchInvRes = await fetch(`/api/branch-inventory/${branch}`);
        const branchItems = await branchInvRes.json();
        
        let remainingToRemove = quantity;
        for (let item of branchItems) {
            if (remainingToRemove <= 0) break;
            if (item.item_name === itemName) {
                let removeFromThis = Math.min(item.quantity, remainingToRemove);
                let newQuantity = item.quantity - removeFromThis;
                let newOriginalQuantity = (item.original_quantity || item.quantity) - removeFromThis;
                if (newOriginalQuantity < 0) newOriginalQuantity = 0;
                
                await fetch(`/api/branch-inventory/${item.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        quantity: newQuantity,
                        original_quantity: newOriginalQuantity
                    })
                });
                
                if (branchInventory[branch]) {
                    let localItem = branchInventory[branch].find(i => i.id === item.id);
                    if (localItem) {
                        localItem.quantity = newQuantity;
                        localItem.originalQuantity = newOriginalQuantity;
                    }
                }
                remainingToRemove -= removeFromThis;
            }
        }
        
        if (branchInventory[branch]) {
            branchInventory[branch] = branchInventory[branch].filter(i => i.quantity > 0);
        }
        
        // ========== 3. آپدیت Finance برنچ ==========
        if (branchFinance[branch]) {
            branchFinance[branch].totalPurchase = Math.max(0,
                (branchFinance[branch].totalPurchase || 0) - returnValue
            );
            branchFinance[branch].totalProfit = 
                (branchFinance[branch].totalSale || 0) - branchFinance[branch].totalPurchase;
        }
        
        // ========== 4. آپدیت Shipments (کم کردن quantity و paid amount) ==========
        let remainingQty = quantity;
        for (let shipment of mainClientToBranchShipments
            .filter(s => s.branch === branch && s.item === itemName)
            .sort((a, b) => new Date(b.date) - new Date(a.date))) {
            
            if (remainingQty <= 0) break;
            
            let qtyToSubtract = Math.min(shipment.qty, remainingQty);
            let newQty = shipment.qty - qtyToSubtract;
            
            // محاسبه مقادیر
            let oldTotalPrice = shipment.sellingPrice * shipment.qty;
            let oldPaidAmount = 0;
            
            // دریافت paidAmount از shipmentPayments
            if (shipment.uniqueKey && shipmentPayments[shipment.uniqueKey] !== undefined) {
                oldPaidAmount = shipmentPayments[shipment.uniqueKey];
            } else {
                oldPaidAmount = getShipmentPaidAmount(shipment);
            }
            
            let newTotalPrice = shipment.sellingPrice * newQty;
            
            // کاهش paidAmount به نسبت تعداد برگشتی
 

            // ارزش ایتم‌های ریترن شده
            let returnedValue = shipment.sellingPrice * qtyToSubtract;

            // کم کردن از paid به اندازه ارزش ریترن شده
            let newPaidAmount = Math.max(0, oldPaidAmount - returnedValue);
            newPaidAmount = Math.round(newPaidAmount * 100) / 100;
            if (newPaidAmount > newTotalPrice) newPaidAmount = newTotalPrice;

            // unpaid دست نمی‌خورد - فقط total و paid کم می‌شود
            let oldUnpaid = Math.max(0, oldTotalPrice - oldPaidAmount);
            let newReminder = oldUnpaid; // unpaid همان می‌ماند
            if (newReminder > newTotalPrice) newReminder = newTotalPrice;
            
            console.log(`Return Update - Shipment ${shipment.id}:`);
            console.log(`  Old: qty=${shipment.qty}, total=${oldTotalPrice}, paid=${oldPaidAmount}`);
            console.log(`  New: qty=${newQty}, total=${newTotalPrice}, paid=${newPaidAmount}, reminder=${newReminder}`);
            
            if (newQty <= 0) {
                // حذف کامل shipment
                const index = mainClientToBranchShipments.findIndex(s => s.id === shipment.id);
                if (index !== -1) mainClientToBranchShipments.splice(index, 1);
                
                await fetch(`/api/shipments/${shipment.id}`, {
                    method: 'DELETE'
                }).catch(err => console.log('Error deleting shipment:', err));
                
                // حذف از shipmentPayments
                if (shipment.uniqueKey) {
                    delete shipmentPayments[shipment.uniqueKey];
                    await fetch(`/api/shipment-payment/${shipment.uniqueKey}`, {
                        method: 'DELETE'
                    }).catch(err => console.log('Error deleting payment:', err));
                }
            } else {
                // آپدیت shipment
                shipment.qty = newQty;
                
                await fetch(`/api/shipments/${shipment.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: shipment.date,
                        branch: shipment.branch,
                        item: shipment.item,
                        qty: newQty,
                        selling_price: shipment.sellingPrice,
                        purchase_price: shipment.purchasePrice,
                        unique_key: shipment.uniqueKey
                    })
                }).catch(err => console.log('Error updating shipment:', err));
                
                // آپدیت payment در دیتابیس
                if (shipment.uniqueKey) {
                    // حذف رکورد قبلی
                    await fetch(`/api/shipment-payment/${shipment.uniqueKey}`, {
                        method: 'DELETE'
                    }).catch(err => console.log('Error deleting old payment:', err));
                    
                    // ذخیره رکورد جدید
                    const updateResponse = await fetch('/api/shipment-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            shipment_id: shipment.uniqueKey, 
                            paid_amount: newPaidAmount
                        })
                    }).catch(err => console.log('Error updating payment:', err));
                    
                    if (updateResponse && updateResponse.ok) {
                        shipmentPayments[shipment.uniqueKey] = newPaidAmount;
                    }
                }
                
                let shipmentId = generateMainClientToBranchShipmentId(shipment);
                shipmentReminders[shipmentId] = newReminder;
            }
            
            updateDailyPayment(shipment.date, shipment, newReminder <= 0, newPaidAmount);
            remainingQty -= qtyToSubtract;
        }
        
        // ========== 5. اضافه کردن ایتم به Main Client Inventory (فقط remaining stock) ==========
        let mainClientItem = mainClientItems.find(i => i.name === itemName);
        
        if (mainClientItem) {
            // فقط distributed را کم می‌کنیم تا remaining زیاد شود
            let distributedKey = itemName;
            let currentDistributed = mainClientDistributed[distributedKey] || 0;
            let newDistributed = Math.max(0, currentDistributed - quantity);
            mainClientDistributed[distributedKey] = newDistributed;
            
            await fetch('/api/main-client-distributed', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    main_client: currentUser.username,
                    item_name: itemName,
                    distributed_quantity: -quantity
                })
            });
        } else {
            // اگر ایتم وجود ندارد، آن را اضافه کن
            const newItemRes = await fetch('/api/inventory', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: itemName,
                    purchase_price: pricePerUnit,
                    selling_price: pricePerUnit,
                    quantity: quantity,
                    supplier: `Returned from ${branch}`,
                    date: getTodayDate()
                })
            });
            const newItem = await newItemRes.json();
            
            mainInventory.push({
                id: newItem.id,
                name: itemName,
                purchasePrice: pricePerUnit,
                sellingPrice: pricePerUnit,
                quantity: quantity,
                supplier: `Returned from ${branch}`,
                date: getTodayDate()
            });
            
            mainClientItems.push({
                id: newItem.id,
                name: itemName,
                sellingPrice: pricePerUnit,
                purchasePrice: pricePerUnit,
                quantity: quantity,
                date: getTodayDate(),
                supplier: `Returned from ${branch}`
            });
        }
        
        // ========== 6. آپدیت وضعیت local برگشت ==========
        returnRequest.approved = true;
        returnRequest.rejected = false;
        returnRequest.status = 'approved';
        
        // ========== 7. ریست کردن مقادیر ذخیره شده ==========
        window._previousTotalUnpaid = null;
        window._previousGrandTotal = null;
        window._adminPreviousTotalUnpaid = null;
        window._adminPreviousGrandTotal = null;
        
        // ========== 8. ذخیره و رفرش ==========
        saveData();
        recalcMainFinance();
        recalcBranchFinance(branch);
        
        await refreshDataFromServer();
        
        alert(`✅ Return Approved!\n\n` +
              `${quantity} ${itemName}(s) returned from ${branch}.\n` +
              `Shipment quantity and payment updated.\n` +
              `Item still visible in payments with updated values.`);
        
        // رفرش صفحات مربوطه
        if (currentUser.role === 'mainclient') {
            renderMainClientReturns();
            renderMainClientInventory();
            renderMainClientPayments();
            renderTotalAmountMain();
            // رفرش سکشن Report در صورت باز بودن
            let activeSection = document.querySelector('.nav-item.active')?.innerText.toLowerCase();
            if (activeSection && activeSection.includes('report')) {
                renderMainClientReport();
            }
        }
        
    } catch (error) {
        console.error('Error approving return:', error);
        alert('Failed to approve return: ' + error.message);
    }
};

                if (currentUser.role === 'mainclient') {

            }
        } catch (err) {
            console.error('Error rejecting return:', err);
            alert('Failed to reject return. Make sure server is running.');
        }
    }
};

                alert('No stock available to return!');
                return;

            let modalContent = `
                <div class="modal-header">
                    <h3>Return Item: ${itemName}</h3>

                </div>
                <div class="form-group">
                    <label>Available Stock: ${maxQuantity}</label>

                <div class="form-group">
                    <label>Quantity to Return</label>
                    <input type="number" id="returnQuantity" min="1" max="${maxQuantity}" value="1">
                    <small style="color: #166534;">Maximum available: ${maxQuantity}</small>
                </div>
                <div class="form-group">
                    <label>Description / Reason for Return</label>
                    <textarea id="returnDescription" rows="3" placeholder="Enter reason for returning items..."></textarea>
