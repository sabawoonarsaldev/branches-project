                <div class="form-group">
                    <label>Total Return Value</label>
                    <input type="text" id="returnTotal" value="${formatMoney(pricePerUnit)}" readonly style="background: #f1f5f9;">
                </div>
                <button class="save-btn" onclick="submitReturn('${itemName}', ${pricePerUnit})">
                    <i class="fas fa-check"></i> Submit Return Request
                </button>
            `;
            
            document.getElementById('modalContent').innerHTML = modalContent;
            document.getElementById('modal').classList.add('active');
            
            document.getElementById('returnQuantity').addEventListener('input', function() {
                let qty = parseInt(this.value) || 0;
                if (qty > maxQuantity) {
                    this.value = maxQuantity;
                    qty = maxQuantity;
                }
                let total = qty * pricePerUnit;
                document.getElementById('returnTotal').value = formatMoney(total);
            });
        };



window.submitReturn = async function(itemName, pricePerUnit) {
    let quantity = parseInt(document.getElementById('returnQuantity').value);
    let description = document.getElementById('returnDescription').value;
    let branch = currentUser.username;
    
    if (!quantity || quantity < 1) {
        alert('Please enter a valid quantity');
        return;
    }
    
    // دریافت موجودی فعلی
    let branchItems = branchInventory[branch]?.filter(i => i.name === itemName) || [];
    let currentStock = branchItems.reduce((sum, i) => sum + i.quantity, 0);
    
    if (quantity > currentStock) {
        alert(`You only have ${currentStock} units available.`);
        return;
    }
    
    try {
        const response = await fetch('/api/returns', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                date: getTodayDate(),
                branch: branch,
                item_name: itemName,
                quantity: quantity,
                price_per_unit: pricePerUnit,
                description: description,
                status: 'pending'
            })
        });
        
        if (response.ok) {
            const newReturn = await response.json();
            console.log('Return saved to database:', newReturn);
            
            // اضافه کردن به آرایه محلی
            branchReturns.push({
                id: newReturn.id,
                date: getTodayDate(),
                branch: branch,
                itemName: itemName,
                quantity: quantity,
                pricePerUnit: pricePerUnit,
                description: description,
                status: 'pending'
            });
            
            closeModal();
            renderBranchReturns();
            alert(`✅ Return request submitted for ${quantity} x ${itemName}. Waiting for approval.`);
        } else {
            const error = await response.json();
            alert('Failed to submit return: ' + error.error);
        }
    } catch (err) {
        console.error('Error submitting return:', err);
        alert('Failed to submit return. Make sure server is running.');
    }
};

        } else {
            paymentBadge = '<span class="badge badge-unpaid">UNPAID</span>';
        }
        
        let remainingValue = 0;

            let totalPrice = (originalShipment.sellingPrice || 0) * (originalShipment.qty || 0);
            let paid = getShipmentPaidAmount(originalShipment);
            remainingValue = totalPrice - paid;
            if (remainingValue < 0) remainingValue = 0;
        }
        
        let rowStyle = isLowStock ? 'style="background: #fff5f5;"' : '';
        let receiveBadge = isMarkedReceived ?

            '<span class="badge badge-warning" style="background: #f59e0b;">⏳ Pending</span>';
        
        // محاسبه درصد باقیمانده از initial stock

                </div>
                <td>${formatMoney(item.sellingPrice)}</div>
                <td>${discount ? `<span class="discount-badge">-${discount.discountPercent}%</span>` : '-'}</div>
                <td class="total-value">${formatMoney(totalValue)}</div>
                <td>${paymentBadge}</div>

window.markSpecificShipmentAsReceived = async function(uniqueId, itemName, qty, shipmentDate) {
    if (confirm(`Have you received ${qty} x ${itemName} from shipment dated ${shipmentDate}?`)) {
        let branch = currentUser.username;
        
        try {
            // ذخیره در دیتابیس
            await markShipmentAsReceived(uniqueId, branch, itemName);
            
            // ذخیره در localStorage با کلید منحصر به فرد
            let storageKey = `branch_received_${branch}_${uniqueId}`;
            localStorage.setItem(storageKey, 'true');
            
            // به روز رسانی shipmentReminders
            let shipment = mainClientToBranchShipments.find(s => s.uniqueKey === uniqueId);
            if (shipment) {
                let shipmentId = generateMainClientToBranchShipmentId(shipment);
                shipmentReminders[shipmentId + '_received'] = true;
            }
            
            saveData();
            
            // فقط رفرش بخش موجودی
            await renderBranchInventory();
            
            // پیام کوچک (تغییر اندازه)
            showSmallAlert(`✅ ${qty} x ${itemName} received!`);
            
        } catch (error) {
            console.error('Error marking as received:', error);
            showSmallAlert('❌ Failed to mark as received');
        }
    }
};

window.lowStockAlert = async function(uniqueId, itemName, currentQuantity) {
    let branch = currentUser.username;
    
    let alertMessage = `Low stock alert for ${itemName}. Current stock: ${currentQuantity} units.`;
    
    try {
        const response = await fetch('/api/alerts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                branch: branch,
                item_name: itemName,
                quantity: currentQuantity,
                message: alertMessage,
                date: getTodayDate()
            })
        });
        
        if (response.ok) {
            const newAlert = await response.json();
            lowStockAlerts.push({
                id: newAlert.id,
                branch: branch,
                itemName: itemName,
                quantity: currentQuantity,
                date: getTodayDate(),
                message: alertMessage,
                resolved: false
            });
            
            // آلرت کوچک به جای alert()
            showSmallAlert(`✅ Alert sent for "${itemName}"`);
            
            // تغییر رنگ دکمه موقت
            let btn = event.target;
            if (btn) {
                let originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Sent!';
                btn.style.background = '#22c55e';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = 'linear-gradient(145deg, #f59e0b, #d97706)';
                }, 1500);
            }
        } else {
            showSmallAlert('❌ Failed to send alert');
        }
    } catch (err) {
        console.error('Error sending alert:', err);
        showSmallAlert('❌ Failed to send alert');
    }
};

async function renderBranchBilling() {
    let branch = currentUser.username;
    
    // First, load sales from database
    try {
        const response = await fetch(`/api/sales/${branch}`);
        if (response.ok) {
            const salesData = await response.json();
            
            // Group sales by bill number
            let bills = {};
            salesData.forEach(sale => {
                if (!bills[sale.bill_number]) {
                    bills[sale.bill_number] = [];
                }
                bills[sale.bill_number].push({
                    date: sale.date.split('T')[0],
                    item: sale.item,
                    qty: sale.qty,
                    price: parseFloat(sale.price),
                    revenue: parseFloat(sale.revenue)
                });
            });
            branchBills[branch] = bills;
        }
    } catch (err) {
        console.log('Error loading bills:', err);
    }
    
    let bills = branchBills[branch] || {};
    let billNumbers = Object.keys(bills);
    
    billNumbers.sort((a, b) => {
        let dateA = bills[a][0]?.date || '';
        let dateB = bills[b][0]?.date || '';
        return new Date(dateB) - new Date(dateA);
    });
    
    let html = `
        <div class="header-actions">
            <h2 class="page-title">Bill Management</h2>
            <button class="refresh-btn" onclick="refreshCurrentSection()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        
        <div class="branch-selector" style="margin-bottom: 30px; flex-direction: column;">
            <div class="form-group" style="width: 100%;">
                <label><i class="fas fa-receipt"></i> Select Bill Number</label>
                <select id="billNumberSelect" onchange="loadBillDetails()" style="width: 100%; padding: 12px;">
                    <option value="">-- Select a bill number --</option>
                    ${billNumbers.map(bill => {
                        let billDate = bills[bill][0]?.date || 'Unknown date';
                        let totalPrice = bills[bill].reduce((sum, item) => sum + item.revenue, 0);
                        return `<option value="${bill}">${bill} - ${formatMoney(totalPrice)} (${billDate})</option>`;
                    }).join('')}
                </select>
            </div>
            <button class="btn-filter" onclick="loadBillDetails()" style="margin-top: 10px; width: 200px;">
                <i class="fas fa-search"></i> Load Bill
            </button>
        </div>
        
        <div id="billDetailsContainer" style="display: none;"></div>
    `;
    
    if (billNumbers.length === 0) {
        html += `
            <div class="empty-state">
                <i class="fas fa-receipt"></i>
                <h3>No Bills Yet</h3>
                <p>Start selling items with bill numbers to see them here.</p>
                <button class="action-btn" onclick="showSection('branchSale')" style="margin-bottom: 0;">
                    <i class="fas fa-cash-register"></i> Go to Sell Items
                </button>
            </div>
        `;
    }
    
    document.getElementById('content').innerHTML = html;
}

window.updateSaleDetails = function() {
    let select = document.getElementById('saleItem');
    if (!select || select.options.length === 0) return;
    
    let selectedOption = select.options[select.selectedIndex];
    let price = parseFloat(selectedOption.dataset.price);
    let originalPrice = parseFloat(selectedOption.dataset.original);
    let discountPercent = parseInt(selectedOption.dataset.discount);
    let availableQty = parseInt(selectedOption.dataset.quantity);
    
    let priceInput = document.getElementById('salePrice');
    if (priceInput) {
        priceInput.value = price;
    }
    
    let qtyInput = document.getElementById('saleQty');
    if (qtyInput) {
        qtyInput.max = availableQty;
        if (parseInt(qtyInput.value) > availableQty) {
            qtyInput.value = availableQty;
        }
    }
    
    let discountInfo = document.getElementById('discountInfo');
    if (discountInfo) {
        if (discountPercent > 0) {
            discountInfo.style.display = 'block';
            let originalPriceDisplay = document.getElementById('originalPriceDisplay');
            let savingsDisplay = document.getElementById('savingsDisplay');
            if (originalPriceDisplay) originalPriceDisplay.innerHTML = formatMoney(originalPrice);
            if (savingsDisplay) {
                let savings = originalPrice - price;
                savingsDisplay.innerHTML = formatMoney(savings) + ` (${discountPercent}%)`;
            }
        } else {
            discountInfo.style.display = 'none';
        }
    }
    
    calculateSaleTotal();
};

window.calculateSaleTotal = function() {
    let qtyInput = document.getElementById('saleQty');
    let priceInput = document.getElementById('salePrice');
    let totalInput = document.getElementById('saleTotal');
    let select = document.getElementById('saleItem');
    let saleBtn = document.getElementById('saleBtn');
    
    // اگر المنت‌ها وجود ندارند، از تابع خارج شو
    if (!qtyInput || !priceInput || !totalInput) {
        console.log('Sale form elements not found, skipping calculateSaleTotal');
        return;
    }
    
    let qty = parseInt(qtyInput.value) || 0;
    let price = parseFloat(priceInput.value) || 0;
    let total = qty * price;
    totalInput.value = formatMoney(total);
    
    if (select && select.selectedIndex > 0) {
        let maxQty = parseInt(select.options[select.selectedIndex].dataset.quantity);
        if (isNaN(maxQty)) maxQty = 0;
        
        if (qty < 1 || qty > maxQty) {
            qtyInput.style.borderColor = '#ef4444';
            if (saleBtn) saleBtn.disabled = true;
        } else {
            qtyInput.style.borderColor = '#bbf7d0';
            if (saleBtn) saleBtn.disabled = false;
        }
    }
};




window.recordSale = async function() {
    console.log('=== RECORD SALE STARTED ===');
    
    let branch = currentUser.username;
    let select = document.getElementById('saleItem');
    
    if (!select || select.selectedIndex === -1) {
        showSmallAlert('Please select an item');
        return;
    }
    
    let selectedOption = select.options[select.selectedIndex];
    let sellingPrice = parseFloat(selectedOption.dataset.price);
    let itemName = selectedOption.dataset.name;
    let purchasePrice = parseFloat(selectedOption.dataset.purchase);
    let qty = parseInt(document.getElementById('saleQty').value);
    let billNumber = document.getElementById('billNumber').value.trim();
    
    if (!billNumber) {
        showSmallAlert('Please enter a Bill Number');
        return;
    }
    
    // بررسی موجودی
    let itemsToSell = branchInventory[branch].filter(i => i.name === itemName);
    let totalAvailable = itemsToSell.reduce((sum, i) => sum + i.quantity, 0);
    
    if (totalAvailable < qty) {
        showSmallAlert(`Insufficient stock! Available: ${totalAvailable}`);
        return;
    }
    
    // ========== 1. UPDATE BRANCH INVENTORY (فقط quantity را کم کن، originalQuantity را تغییر نده) ==========
    let remainingQty = qty;
    
    for (let item of itemsToSell) {
        if (remainingQty <= 0) break;
        
        let takeFromThis = Math.min(item.quantity, remainingQty);
        let newQuantity = item.quantity - takeFromThis;
        
        try {
            const updateResponse = await fetch(`/api/branch-inventory/${item.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ quantity: newQuantity })
            });
            
            if (updateResponse.ok) {
                item.quantity = newQuantity;
                // originalQuantity را تغییر نده
                console.log(`Sold ${takeFromThis} from item ID ${item.id}, new quantity: ${newQuantity} (original: ${item.originalQuantity})`);
            }
        } catch (err) {
            console.error('Error updating branch inventory:', err);
        }
        
        remainingQty -= takeFromThis;
    }
    
    // حذف ایتم‌های با quantity صفر
    branchInventory[branch] = branchInventory[branch].filter(i => i.quantity > 0);
    
    // ========== 2. SAVE SALE TO DATABASE ==========
    let revenue = qty * sellingPrice;
    let cost = qty * purchasePrice;
    let profit = revenue - cost;
    
    let saleData = {
        date: getTodayDate(),
        branch: branch,
        item: itemName,
        qty: qty,
        price: sellingPrice,
        purchase_price: purchasePrice,
        revenue: revenue,
        cost: cost,
        profit: profit,
        bill_number: billNumber
    };
    
    try {
        const saleResponse = await fetch('/api/sales', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(saleData)
        });
        
        if (!saleResponse.ok) {
            throw new Error('Failed to save sale');
        }
        
        const savedSale = await saleResponse.json();
        console.log('Sale saved:', savedSale);
        
        // ========== 3. UPDATE LOCAL DATA ==========
        let saleRecord = {
            id: salesHistory.length + 1,
            date: getTodayDate(),
            branch: branch,
            item: itemName,
            qty: qty,
            price: sellingPrice,
            purchasePrice: purchasePrice,
            revenue: revenue,
            cost: cost,
            profit: profit,
            billNumber: billNumber
        };
        
        salesHistory.push(saleRecord);
        
        if (!branchBills[branch]) {
            branchBills[branch] = {};
        }
        if (!branchBills[branch][billNumber]) {
            branchBills[branch][billNumber] = [];
        }
        branchBills[branch][billNumber].push(saleRecord);
        
        if (!branchFinance[branch]) {
            branchFinance[branch] = { totalSale: 0, totalPurchase: 0, totalProfit: 0, totalLoss: 0, totalExpenses: 0 };
        }
        branchFinance[branch].totalSale += revenue;
        branchFinance[branch].totalProfit += profit;
        
        saveData();
        recalcMainFinance();
        
        showSmallAlert(`✅ Sale recorded!\n${itemName} x${qty} = ${formatMoney(revenue)}`);
        
        // ========== 4. برگشت به صفحه Sale با رفرش ==========
        await renderBranchSale();
        
    } catch (error) {
        console.error('Error recording sale:', error);
        showSmallAlert('❌ Failed to record sale: ' + error.message);
    }
};

window.updateItem = async function(id) {

    if (!item) return;
    
    let newName = document.getElementById('itemName').value;
    let newPurchasePrice = parseFloat(document.getElementById('purchasePrice').value);
    let newSellingPrice = parseFloat(document.getElementById('sellingPrice').value);
    let newQuantity = parseInt(document.getElementById('quantity').value);
    let newSupplier = document.getElementById('supplier').value;
    let newDate = document.getElementById('itemDate').value;
    
    if (!newName || isNaN(newPurchasePrice) || newPurchasePrice < 0 || 
        isNaN(newSellingPrice) || newSellingPrice < 0 || 
        isNaN(newQuantity) || newQuantity < 0 || !newSupplier) {
        alert('Please fill all fields correctly');
        return;
    }
    
    if (!newDate) {
        newDate = getTodayDate();
    }
    
    try {
        const response = await fetch(`/api/inventory/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: newName,
                purchase_price: newPurchasePrice,
                selling_price: newSellingPrice,
                quantity: newQuantity,
                supplier: newSupplier,
                date: newDate
            })
        });
        
        if (!response.ok) {
            const error = await response.text();
            throw new Error(`Server returned ${response.status}: ${error}`);
        }
        
        const updatedItem = await response.json();
        console.log('Item updated in database:', updatedItem);
        
        // ✅ به روز رسانی در mainInventory
        item.name = newName;
        item.purchasePrice = newPurchasePrice;
        item.sellingPrice = newSellingPrice;
        item.quantity = newQuantity;
        item.supplier = newSupplier;
        item.date = newDate;
        
        // ✅ به روز رسانی در mainClientItems (همه رکوردهای با همین نام)
        for (let mainItem of mainClientItems) {
            if (mainItem.name === item.name && mainItem.id === id) {
                mainItem.name = newName;
                mainItem.purchasePrice = newPurchasePrice;
                mainItem.sellingPrice = newSellingPrice;
                mainItem.quantity = newQuantity;
                mainItem.supplier = newSupplier;
                mainItem.date = newDate;
                console.log(`Updated mainClientItem ID ${mainItem.id}: quantity = ${newQuantity}`);
            }
        }
        
        closeModal();
        
        // رفرش صفحه
        if (currentUser.role === 'admin') {
            // رفرش دیتا از دیتابیس
            await refreshDataFromServer();
            renderInventory();
        }
        
        alert(`Item "${newName}" updated successfully!`);
        
    } catch (error) {
        console.error('Error updating item:', error);
        alert('Failed to update item: ' + error.message);
    }
};


window.deleteItem = async function(id) {
    if (confirm('Are you sure you want to delete this item? This will remove it from all branches and main clients!')) {
        let item = mainInventory.find(i => i.id === id);
        if (item) {
            try {
                await deleteInventoryItem(id);
                
                // ✅ حذف از mainClientItems (فقط رکورد با همین id)
                const index = mainClientItems.findIndex(i => i.id === id);
                if (index !== -1) {
                    mainClientItems.splice(index, 1);
                }
                
                // حذف از mainInventory
                const invIndex = mainInventory.findIndex(i => i.id === id);
                if (invIndex !== -1) {
                    mainInventory.splice(invIndex, 1);
                }
                
                await refreshDataFromServer();
                
                if (currentUser.role === 'admin') {
                    renderInventory();
                }
                
                alert(`Item "${item.name}" deleted from all locations!`);
            } catch (error) {
                console.error('Error deleting item:', error);
                alert('Failed to delete item. Make sure server is running.');
            }
        }
    }
};

// Helper function for monthly expenses calculation
function calculateBranchMonthlyExpenses(expenses) {
    let currentDate = new Date();
    let currentMonth = currentDate.getMonth();
    let currentYear = currentDate.getFullYear();
    
    return expenses.filter(exp => {
        let expDate = new Date(exp.date);
        return expDate.getMonth() === currentMonth && expDate.getFullYear() === currentYear;
    }).reduce((sum, exp) => sum + exp.amount, 0);
}

    let updatedExpense = {
        date: document.getElementById('branchExpDate').value,

        amount: parseFloat(document.getElementById('branchExpAmount').value),
        description: document.getElementById('branchExpDescription').value,
        user_role: 'branch',
        username: branch
    };
    
    try {

            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedExpense)
        });

window.deleteBranchExpense = async function(id) {
    if (confirm('Are you sure you want to delete this expense?')) {
        let branch = currentUser.username;
        
        try {
            const response = await fetch(`/api/expenses/${id}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to delete expense');
            }
            
            branchExpenses[branch] = branchExpenses[branch].filter(e => e.id !== id);
            
            if (branchFinance[branch]) {
                branchFinance[branch].totalExpenses -= exp.amount;
            }
            
            saveData();
            renderBranchExpenses();
            
            alert('Expense deleted successfully!');
        } catch (error) {
            console.error('Error deleting expense:', error);
            alert('Failed to delete expense.');
        }
    }
};

async function renderBranchFinance() {
    let branch = currentUser.username;
    
    // ✅ بارگذاری فروش از دیتابیس
    try {
        const salesResponse = await fetch(`/api/sales/${branch}`);
        if (salesResponse.ok) {
            const salesData = await salesResponse.json();
            salesHistory = salesData.map(s => ({
                id: s.id,
                date: s.date ? s.date.split('T')[0] : getTodayDate(),
                branch: s.branch,
                item: s.item,
                qty: parseInt(s.qty),
                price: parseFloat(s.price),
                purchasePrice: parseFloat(s.purchase_price),
                revenue: parseFloat(s.revenue),
                cost: parseFloat(s.cost),
                profit: parseFloat(s.profit),
                billNumber: s.bill_number
            }));
            console.log('Sales loaded for branch:', salesHistory.length);
        }
    } catch (err) {
        console.log('Error loading sales:', err);
    }
    
    // ✅ بارگذاری Expenses از دیتابیس
    try {
        const expensesResponse = await fetch(`/api/expenses/branch/${branch}`);
        if (expensesResponse.ok) {
            const expensesData = await expensesResponse.json();
            branchExpenses[branch] = expensesData.map(e => ({
                id: e.id,
                date: e.date ? e.date.split('T')[0] : getTodayDate(),
                category: e.category,
                amount: parseFloat(e.amount),
                description: e.description

    return inventory.map((item, index) => {
        let itemShipments = shipments.filter(s => s.item === item.name);
        let totalReceived = itemShipments.reduce((sum, s) => sum + (s.qty || 0), 0);
        
        // Get actual sales from salesHistory for this specific branch
        let itemSales = salesHistory.filter(s => 
            s.branch === branch && s.item === item.name
        );
        let sold = itemSales.reduce((sum, s) => sum + s.qty, 0);
        let revenue = itemSales.reduce((sum, s) => sum + s.revenue, 0);
        let profit = itemSales.reduce((sum, s) => sum + s.profit, 0);
        
        // Get returns for this item
        // Get returns for this item - CHECK ALL POSSIBLE FIELD NAMES
        let itemReturns = branchReturns.filter(r => {
            // Check both possible field names for branch
            let returnBranch = r.branch || r.branchName || r.branchUsername;
            // Check both possible field names for item
            let returnItem = r.itemName || r.item || r.name;
            // Check status
            let isApprovedOrPaid = r.status === 'approved' || r.status === 'paid' || r.approved === true || r.paid === true;
            
            return returnBranch === branch && returnItem === item.name && isApprovedOrPaid;

// Update User Function
window.updateUser = async function(id) {
    let user = users.find(u => u.id === id);
    if (!user) return;
    
    let newUsername = document.getElementById('editUsername').value;
    let newPassword = document.getElementById('editPassword').value;
    let newRole = document.getElementById('editRole').value;
    
    if (!newUsername || !newPassword) {
        alert('Please fill all fields');
        return;
    }
    
    // Check if username already exists (excluding current user)
    if (newUsername !== user.username && users.some(u => u.username === newUsername && !u.deleted && u.id !== id)) {
        alert('Username already exists!');
        return;
    }
    
    try {
        // Update in database via API
        await updateUser(id, {
            username: newUsername,
            password: newPassword,
            role: newRole,
            frozen: user.frozen,
            blocked: user.blocked,
            deleted: user.deleted
        });
        
        // Refresh users from server
        const freshUsers = await fetchUsers();
        users = freshUsers;
        
        closeModal();
        renderUsers();
        
        // If current user was edited, update currentUser display
        if (currentUser && currentUser.username === user.username) {
            currentUser.username = newUsername;
            document.getElementById('userDisplay').textContent = newUsername;
        }
        
        alert(`User ${newUsername} updated successfully!`);
    } catch (error) {
        console.error('Error updating user:', error);
        alert('Failed to update user.');
    }
};

// Delete user function

window.deleteUser = async function(id) {
    let user = users.find(u => u.id === id);
    if (!user) return;
    
    if (user.role === 'admin' && user.username === 'admin') {
        alert('Cannot delete the main admin user!');
        return;
    }
    
    let confirmMessage = `Delete user "${user.username}" permanently? This will remove all associated data!`;
    if (user.role === 'mainclient') {
        confirmMessage = `Delete main client "${user.username}" permanently?\n\nThis will also delete:\n- All payments made by this client\n- All distributed items\n- All expenses\n\nThis action cannot be undone!`;
    } else if (user.role === 'branch') {
        confirmMessage = `Delete branch "${user.username}" permanently?\n\nThis will also delete:\n- Branch inventory\n- Shipments to this branch\n- Sales history\n- Returns\n- Expenses\n\nThis action cannot be undone!`;
    }
    
    if (confirm(confirmMessage)) {
        try {
            console.log(`Deleting user ${user.username} with ID ${id}...`);
            const response = await fetch(`/api/users/${id}/hard`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to delete user');
            }
            
            console.log(`User ${user.username} deleted successfully`);
            
            // Remove from local array
            users = users.filter(u => u.id !== id);
            
            // Also remove from any local data structures
            if (user.role === 'branch') {
                delete branchInventory[user.username];
                delete branchFinance[user.username];
                delete branchExpenses[user.username];
            } else if (user.role === 'mainclient') {
                delete mainClientExpenses[user.username];
                // حذف payments مربوط به این main client
                Object.keys(mainClientPayments).forEach(key => {
                    if (key.startsWith(user.username)) {
                        delete mainClientPayments[key];
                    }
                });
            }
            
            // Refresh the users list
            renderUsers();
            alert(`User "${user.username}" deleted successfully!`);
            
        } catch (error) {
            console.error('Error deleting user:', error);
            alert('Failed to delete user: ' + error.message);
        }
    }
};

async function loadBranchInventory() {
    let select = document.getElementById('branchInventorySelect');
    if (!select || !select.value) {
        alert('Please select a branch or main client');
        return;
    }

    let client = select.value;
    let selectedOption = select.options[select.selectedIndex];
    let role = selectedOption.dataset.role;
    
    let inventory = [];
    try {
        if (role === 'mainclient') {
            // ✅ برای Main Client، از تابع getMainClientItems استفاده کن
            // ابتدا currentUser را موقتاً تغییر بده
            let originalUser = currentUser;
            currentUser = { username: client, role: 'mainclient' };
            
            // دریافت ایتم‌ها با وضعیت پرداخت صحیح
            const mainClientItemsData = await getMainClientItems();
            inventory = mainClientItemsData;
            
            // برگرداندن currentUser به حالت اول
            currentUser = originalUser;
            
            console.log(`Main client inventory loaded for ${client}:`, inventory.length);
            console.log('Payment statuses:', inventory.map(i => ({ name: i.name, paid: i.paid })));
        } else {
            // برای Branch
            if (branchInventory[client] && branchInventory[client].length > 0) {
                inventory = branchInventory[client];
            } else {
                try {
                    const branchInvRes = await fetch(`/api/branch-inventory/${client}`);
                    const branchInvData = await branchInvRes.json();
                    inventory = branchInvData.map(b => ({
                        id: b.id,
                        name: b.item_name,
                        quantity: parseInt(b.quantity),
                        purchasePrice: parseFloat(b.purchase_price),
                        sellingPrice: parseFloat(b.selling_price),
                        supplier: b.supplier
                    }));
                } catch (err) {
                    inventory = [];
                }
            }
        }
    } catch (err) {
        console.error('Error loading inventory:', err);
        inventory = [];
    }
    
    // محاسبه مجموع
    let totalItems = inventory.length;
    let totalStock = 0;
    let totalValue = 0;
    
    for (let i = 0; i < inventory.length; i++) {
        const item = inventory[i];
        const qty = parseInt(item.quantity) || 0;
        const price = parseFloat(item.purchasePrice) || parseFloat(item.purchase_price) || 0;
        totalStock += qty;
        totalValue += price * qty;
    }
    
    let html = `
        <div class="branch-stats">
            <div class="branch-stat-card">
                <div class="label">Total Items</div>
                <div class="value">${totalItems}</div>
            </div>
            <div class="branch-stat-card">
                <div class="label">Total Stock</div>
                <div class="value">${totalStock}</div>
            </div>
            <div class="branch-stat-card">
                <div class="label">Total Value</div>
                <div class="value total">${formatMoney(totalValue)}</div>
            </div>
        </div>
        
        <div class="inventory-actions">
            <button class="action-btn" onclick="showAddBranchItemModal('${client}', '${role}')">
                <i class="fas fa-plus"></i> Add Item to ${client}
            </button>
            <button class="refresh-btn" onclick="loadBranchInventory()" style="margin-left: 10px;">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    `;

    if (inventory.length === 0) {

            let purchasePrice = parseFloat(document.getElementById('branchItemPurchasePrice').value);
            let sellingPrice = parseFloat(document.getElementById('branchItemSellingPrice').value);
            let supplier = document.getElementById('branchItemSupplier').value;

                alert('Please fill all fields');

            if (role === 'mainclient') {

                    id: mainClientItems.length + 1,
                    name: name,
                    sellingPrice: sellingPrice,
                    purchasePrice: purchasePrice,
                    quantity: quantity,
                    date: getTodayDate(),
                    supplier: supplier
                };
                mainClientItems.push(newItem);
            } else {
                if (!branchInventory[client]) {
                    branchInventory[client] = [];
                }

                    id: branchInventory[client].length + 1,
                    name: name,
                    quantity: quantity,
                    purchasePrice: purchasePrice,
                    sellingPrice: sellingPrice,
                    supplier: supplier
                };

        window.updateBranchItem = function(client, itemId, role) {
            let oldItem;
            let item;
            
            if (role === 'mainclient') {
                oldItem = mainClientItems.find(i => i.id === itemId);
                if (!oldItem) return;
                
                let oldName = oldItem.name;
                
                oldItem.name = document.getElementById('branchItemName').value;
                oldItem.quantity = parseInt(document.getElementById('branchItemQuantity').value);
                oldItem.purchasePrice = parseFloat(document.getElementById('branchItemPurchasePrice').value);
                oldItem.sellingPrice = parseFloat(document.getElementById('branchItemSellingPrice').value);
                oldItem.supplier = document.getElementById('branchItemSupplier').value;
                
                let mainInventoryItem = mainInventory.find(i => i.name === oldName);
                if (mainInventoryItem) {
                    mainInventoryItem.name = oldItem.name;
                    mainInventoryItem.purchasePrice = oldItem.purchasePrice;
                    mainInventoryItem.sellingPrice = oldItem.sellingPrice;
                    mainInventoryItem.quantity = oldItem.quantity;
                    mainInventoryItem.supplier = oldItem.supplier;
                }
                
                Object.keys(branchInventory).forEach(branchKey => {
                    branchInventory[branchKey].forEach(branchItem => {
                        if (branchItem.name === oldName) {
                            branchItem.name = oldItem.name;
                            branchItem.purchasePrice = oldItem.purchasePrice;
                            branchItem.sellingPrice = oldItem.sellingPrice;
                            branchItem.supplier = oldItem.supplier;
                        }
                    });
                });
                
                shipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                mainClientToBranchShipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                salesHistory.forEach(sale => {
                    if (sale.item === oldName) {
                        sale.item = oldItem.name;
                    }
                });
                
                lowStockAlerts.forEach(alert => {
                    if (alert.itemName === oldName) {
                        alert.itemName = oldItem.name;
                    }
                });
                
                branchReturns.forEach(ret => {
                    if (ret.itemName === oldName) {
                        ret.itemName = oldItem.name;
                        ret.pricePerUnit = oldItem.purchasePrice;
                    }
                });
                
            } else {
                oldItem = branchInventory[client]?.find(i => i.id === itemId);
                if (!oldItem) return;
                
                let oldName = oldItem.name;
                let oldPurchaseTotal = oldItem.purchasePrice * oldItem.quantity;
                
                oldItem.name = document.getElementById('branchItemName').value;
                oldItem.quantity = parseInt(document.getElementById('branchItemQuantity').value);
                oldItem.purchasePrice = parseFloat(document.getElementById('branchItemPurchasePrice').value);
                oldItem.sellingPrice = parseFloat(document.getElementById('branchItemSellingPrice').value);
                oldItem.supplier = document.getElementById('branchItemSupplier').value;
                
                if (branchFinance[client]) {
                    let newPurchaseTotal = oldItem.purchasePrice * oldItem.quantity;
                    branchFinance[client].totalPurchase = (branchFinance[client].totalPurchase || 0) - oldPurchaseTotal + newPurchaseTotal;
                }
                
                let mainInventoryItem = mainInventory.find(i => i.name === oldName);
                if (mainInventoryItem) {
                    mainInventoryItem.name = oldItem.name;
                    mainInventoryItem.purchasePrice = oldItem.purchasePrice;
                    mainInventoryItem.sellingPrice = oldItem.sellingPrice;
                    mainInventoryItem.quantity += (oldItem.quantity - mainInventoryItem.quantity);
                    mainInventoryItem.supplier = oldItem.supplier;
                }
                
                mainClientItems.forEach(mainItem => {
                    if (mainItem.name === oldName) {
                        mainItem.name = oldItem.name;
                        mainItem.purchasePrice = oldItem.purchasePrice;
                        mainItem.sellingPrice = oldItem.sellingPrice;
                        mainItem.supplier = oldItem.supplier;
                    }
                });
                
                Object.keys(branchInventory).forEach(branchKey => {
                    if (branchKey !== client) {
                        branchInventory[branchKey].forEach(branchItem => {
                            if (branchItem.name === oldName) {
                                branchItem.name = oldItem.name;
                                branchItem.purchasePrice = oldItem.purchasePrice;
                                branchItem.sellingPrice = oldItem.sellingPrice;
                                branchItem.supplier = oldItem.supplier;
                            }
                        });
                    }
                });
                
                shipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                mainClientToBranchShipments.forEach(shipment => {
                    if (shipment.item === oldName) {
                        shipment.item = oldItem.name;
                        shipment.purchasePrice = oldItem.purchasePrice;
                        shipment.sellingPrice = oldItem.sellingPrice;
                    }
                });
                
                salesHistory.forEach(sale => {
                    if (sale.item === oldName) {
                        sale.item = oldItem.name;
                    }
                });
                
                lowStockAlerts.forEach(alert => {
                    if (alert.itemName === oldName) {
                        alert.itemName = oldItem.name;
                    }
                });
                
                branchReturns.forEach(ret => {
                    if (ret.itemName === oldName && ret.branch === client) {
                        ret.itemName = oldItem.name;
                        ret.pricePerUnit = oldItem.purchasePrice;
                    }
                });
            }

            recalcMainFinance();
            saveData();
            closeModal();
            loadBranchInventory();
            
            alert(`Item updated successfully across all locations!`);
        };

        window.deleteBranchItem = function(client, itemId, role) {
            if (confirm('Are you sure you want to delete this item? This will remove it from all locations!')) {
                if (role === 'mainclient') {
                    let item = mainClientItems.find(i => i.id === itemId);
                    if (item) {
                        let itemName = item.name;
                        mainClientItems = mainClientItems.filter(i => i.id !== itemId);
                        mainInventory = mainInventory.filter(i => i.name !== itemName);
                        
                        Object.keys(branchInventory).forEach(branchKey => {
                            branchInventory[branchKey] = branchInventory[branchKey].filter(i => i.name !== itemName);
                        });
                        
                        shipments = shipments.filter(s => s.item !== itemName);
                        mainClientToBranchShipments = mainClientToBranchShipments.filter(s => s.item !== itemName);
                        salesHistory = salesHistory.filter(s => s.item !== itemName);
                        lowStockAlerts = lowStockAlerts.filter(a => a.itemName !== itemName);
                    }
                } else {
                    let item = branchInventory[client]?.find(i => i.id === itemId);
                    if (item) {
                        let itemName = item.name;
                        
                        if (branchFinance[client]) {
                            branchFinance[client].totalPurchase -= (item.purchasePrice * item.quantity);
                        }
                        
                        branchInventory[client] = branchInventory[client].filter(i => i.id !== itemId);
                        mainInventory = mainInventory.filter(i => i.name !== itemName);
                        mainClientItems = mainClientItems.filter(i => i.name !== itemName);
                        
                        Object.keys(branchInventory).forEach(branchKey => {
                            if (branchKey !== client) {
                                branchInventory[branchKey] = branchInventory[branchKey].filter(i => i.name !== itemName);
                            }
                        });
                        
                        shipments = shipments.filter(s => s.item !== itemName);
                        mainClientToBranchShipments = mainClientToBranchShipments.filter(s => s.item !== itemName);
                        salesHistory = salesHistory.filter(s => s.item !== itemName);
                        lowStockAlerts = lowStockAlerts.filter(a => a.itemName !== itemName);
                    }
                }
                
                recalcMainFinance();
                saveData();
                loadBranchInventory();
                
                alert(`Item deleted from all locations successfully!`);
            }
        };

window.saveNewUser = async function(role) {
    const btn = document.querySelector('#modalContent .save-btn') 
         || document.querySelector('#distributeBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Please wait...'; }

    let username = document.getElementById('newUsername').value;
    let password = document.getElementById('newPassword').value;
    
    if (!username || !password) {
        alert('Please fill all fields');
        return;
    }
  
    // Check if username already exists in current users array
    if (users.some(u => u.username === username && !u.deleted)) {
        alert('Username already exists!');
        return;
    }

    try {
        // Add to database via API
        const newUser = await addUser({
            username: username,
            password: password,
            role: role,
            frozen: false,
            blocked: false,
            deleted: false
        });
        
        console.log('User added to database:', newUser);
        
        // Refresh users from server
        const freshUsers = await fetchUsers();
        users = freshUsers;
        
        // Initialize data structures based on role
        if (role === 'branch') {
            if (!branchInventory[username]) branchInventory[username] = [];
            if (!branchFinance[username]) branchFinance[username] = { totalSale: 0, totalPurchase: 0, totalProfit: 0, totalLoss: 0, totalExpenses: 0 };
            if (!branchExpenses[username]) branchExpenses[username] = [];
        } else if (role === 'mainclient') {
            if (!mainClientExpenses[username]) mainClientExpenses[username] = [];
        }
        
        saveData();
        closeModal();
        
        // Refresh the appropriate user list based on current user role
        if (currentUser.role === 'admin') {
            renderUsers();
        } else if (currentUser.role === 'mainclient') {
            renderMainClientUsers();
        }
        
        alert(`${role === 'admin' ? 'Admin' : (role === 'branch' ? 'Branch' : 'Main Client')} "${username}" added successfully!`);
    } catch (error) {
        if (btn) { btn.disabled = false; btn.textContent = 'real text'; }
        console.error('Error adding user:', error);
        alert(error.message || 'Failed to add user. Make sure server is running.');
    }
};

        role = 'mainclient';
    } else {
        username = document.getElementById('branchUser').value;
        password = document.getElementById('branchPass').value;
        role = 'branch';
    }

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, role })
        });

        if (response.ok) {
            const user = await response.json();
            currentUser = { role: user.role, username: user.username };
            
            // IMPORTANT: Refresh data after login
            await refreshDataFromServer();
            
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            document.getElementById('roleDisplay').textContent = currentUser.role === 'admin' ? 'Admin' : (currentUser.role === 'mainclient' ? 'Main Client' : 'Branch');
            document.getElementById('userDisplay').textContent = currentUser.username;
            
            renderSidebar();
            
            if (currentUser.role === 'admin') {
                renderInventory();
            } else if (currentUser.role === 'mainclient') {
                renderMainClientInventory();
            } else {
                renderBranchInventory();
            }
        }else {
            const error = await response.json();
            alert(error.error || 'Invalid credentials');
        }
    } catch (error) {
        console.error('Login error:', error);
        alert('Cannot connect to server. Make sure server is running on port 5000');
    }
});

// Freeze user function
window.freezeUser = function(userId) {
    let user = users.find(u => u.id === userId);
    if (user && confirm(`Are you sure you want to freeze user "${user.username}"?`)) {
        user.frozen = true;
        user.blocked = false;
        saveData();
        renderUsers();
        alert(`User "${user.username}" has been frozen successfully.`);
    }
};

// Block user function
window.blockUser = function(userId) {
    let user = users.find(u => u.id === userId);
    if (user && confirm(`Are you sure you want to block user "${user.username}"?`)) {
        user.blocked = true;
        user.frozen = false;
        saveData();
        renderUsers();
        alert(`User "${user.username}" has been blocked successfully.`);
    }
};


// Unfreeze user function
window.unfreezeUser = function(userId) {
    let user = users.find(u => u.id === userId);
    if (user && confirm(`Are you sure you want to unfreeze user "${user.username}"?`)) {
        user.frozen = false;
        saveData();
        renderUsers();
        alert(`User "${user.username}" has been unfrozen successfully.`);
    }
};

// Unblock user function
window.unblockUser = function(userId) {
    let user = users.find(u => u.id === userId);
    if (user && confirm(`Are you sure you want to unblock user "${user.username}"?`)) {
        user.blocked = false;
        saveData();
        renderUsers();
        alert(`User "${user.username}" has been unblocked successfully.`);
    }
};

// Helper function to escape HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
